<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XLFitness AI — Virtual Office</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#07090f;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}

    /* Top bar */
    .topbar{padding:14px 24px;background:#0b0f18;border-bottom:1px solid #141e2e;display:flex;align-items:center;gap:12px;}
    .logo{font-size:1rem;font-weight:900;color:#00aaff;letter-spacing:3px;}
    .topbar-sub{color:#334;font-size:.72rem;letter-spacing:1px;}
    .sprint-badge{margin-left:auto;background:#00aaff15;border:1px solid #00aaff33;color:#00aaff;padding:4px 14px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:1px;}
    #last-updated{font-size:.65rem;color:#223;margin-left:10px;}
    .refresh-btn{background:none;border:1px solid #1a2a3a;color:#445;padding:5px 12px;border-radius:7px;font-size:.68rem;cursor:pointer;}
    .refresh-btn:hover{border-color:#00aaff44;color:#00aaff;}

    /* Layout */
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0;}
    @media(max-width:700px){.layout{grid-template-columns:1fr;}}

    /* Sections */
    .section{padding:20px 24px;border-bottom:1px solid #0f141e;}
    .section-label{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:#334;margin-bottom:14px;}
    .section h2{font-size:1rem;font-weight:900;margin-bottom:16px;}

    /* Agent cards */
    .agents{display:flex;flex-direction:column;gap:10px;}
    .agent-card{background:#0b0f18;border:1px solid #141e2e;border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;transition:border-color .2s;}
    .agent-card.active{border-color:#0f044466;}
    .agent-card.standby{border-color:#141e2e;}
    .agent-emoji{font-size:1.8rem;flex-shrink:0;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:#0f141e;border-radius:10px;}
    .agent-info{flex:1;min-width:0;}
    .agent-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
    .agent-name{font-size:.9rem;font-weight:800;}
    .agent-role{font-size:.62rem;color:#445;margin-left:auto;}
    .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .status-dot.active{background:#0f0;box-shadow:0 0 6px #0f0;animation:pulse 1.5s infinite alternate;}
    .status-dot.standby{background:#334;}
    @keyframes pulse{to{box-shadow:0 0 12px #0f0;}}
    .agent-task{font-size:.73rem;color:#667;line-height:1.5;margin-bottom:6px;}
    .agent-queue{display:flex;flex-direction:column;gap:3px;}
    .queue-item{font-size:.65rem;color:#2a3a50;padding:2px 0;}
    .queue-item::before{content:'→ ';color:#1a2a3a;}

    /* Tasks */
    .tasks-grid{display:flex;flex-direction:column;gap:8px;}
    .task-card{background:#0b0f18;border:1px solid #141e2e;border-radius:10px;padding:12px 14px;}
    .task-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .task-title{font-size:.82rem;font-weight:700;flex:1;}
    .task-id{font-size:.6rem;color:#223;flex-shrink:0;}
    .task-meta{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
    .task-priority{font-size:.63rem;}
    .task-assignee{font-size:.63rem;background:#141e2e;padding:2px 8px;border-radius:10px;color:#556;}
    .task-status{font-size:.63rem;padding:2px 8px;border-radius:10px;font-weight:700;}
    .task-status.done{background:#0f021a;color:#0f0;border:1px solid #0f04;}
    .task-status.in_progress{background:#00aaff08;color:#00aaff;border:1px solid #00aaff33;animation:blink 2s infinite;}
    .task-status.queued{background:#1a1a1a;color:#334;border:1px solid #222;}
    @keyframes blink{50%{opacity:.6;}}
    .task-desc{font-size:.7rem;color:#445;line-height:1.5;}
    .task-blocked{font-size:.65rem;color:#f9044a99;margin-top:4px;}
    .task-blocked::before{content:'⏳ ';}

    /* Roadmap */
    .roadmap{display:flex;flex-direction:column;gap:8px;}
    .phase-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0b0f18;border:1px solid #141e2e;border-radius:9px;}
    .phase-name{flex:1;}
    .phase-label{font-size:.7rem;font-weight:800;}
    .phase-sub{font-size:.63rem;color:#445;margin-top:1px;}
    .phase-bar-wrap{width:120px;height:5px;background:#141e2e;border-radius:3px;overflow:hidden;}
    .phase-bar{height:100%;border-radius:3px;background:#00aaff;transition:width .6s;}
    .phase-pct{font-size:.65rem;font-weight:700;width:28px;text-align:right;}
    .phase-row.in_progress{border-color:#00aaff22;}
    .phase-row.in_progress .phase-label{color:#00aaff;}
    .phase-row.done{border-color:#0f04;}
    .phase-row.done .phase-label{color:#0f0;}

    /* Activity feed */
    .feed{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;}
    .feed-item{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:#0b0f18;border-radius:8px;border:1px solid #0f141e;}
    .feed-icon{font-size:.9rem;flex-shrink:0;margin-top:1px;}
    .feed-msg{font-size:.72rem;color:#556;line-height:1.5;flex:1;}
    .feed-msg b{color:#aaa;}
    .feed-time{font-size:.6rem;color:#223;flex-shrink:0;}

    /* Full width sections */
    .full{grid-column:1/-1;}

    /* Links bar */
    .links{padding:16px 24px;border-top:1px solid #0f141e;display:flex;gap:10px;flex-wrap:wrap;}
    .link-btn{padding:8px 16px;border-radius:8px;font-size:.75rem;font-weight:700;text-decoration:none;border:1px solid #141e2e;color:#556;background:#0b0f18;}
    .link-btn:hover{border-color:#00aaff44;color:#00aaff;}
    .link-btn.primary{border-color:#00aaff44;color:#00aaff;}
  </style>
</head>
<body>

<div class="topbar">
  <span class="logo">XLFITNESS</span>
  <span class="topbar-sub">Virtual Office</span>
  <span class="sprint-badge" id="sprint-name">Loading…</span>
  <span id="last-updated"></span>
  <button class="refresh-btn" onclick="load()">↺ Refresh</button>
</div>

<div id="main" class="layout">
  <div style="padding:40px;text-align:center;color:#334;grid-column:1/-1">Loading office…</div>
</div>

<div class="links">
  <a class="link-btn primary" href="../scripts/lat_pulldown_counter.html">▶ Live Counter</a>
  <a class="link-btn" href="../skeleton_test.html">🦴 Skeleton Test</a>
  <a class="link-btn" href="../demo.html">📋 Stakeholder Deck</a>
  <a class="link-btn" href="https://github.com/XLDonkey/XLFitness_pose-estimation" target="_blank">📦 GitHub</a>
</div>

<script>
const TASKS_URL = 'https://raw.githubusercontent.com/XLDonkey/XLFitness_pose-estimation/main/office/tasks.json';
const COMMITS_URL = 'https://api.github.com/repos/XLDonkey/XLFitness_pose-estimation/commits?per_page=12';

function timeAgo(iso) {
  const d = new Date(iso), now = new Date();
  const s = Math.floor((now - d) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function statusLabel(s) {
  if (s === 'done') return '✅ Done';
  if (s === 'in_progress') return '⚡ In Progress';
  return '⏳ Queued';
}

async function load() {
  try {
    const [tasksRes, commitsRes] = await Promise.all([
      fetch(TASKS_URL + '?t=' + Date.now()),
      fetch(COMMITS_URL)
    ]);
    const tasks = await tasksRes.json();
    const commits = commitsRes.ok ? await commitsRes.json() : [];

    document.getElementById('sprint-name').textContent = tasks.sprint;
    document.getElementById('last-updated').textContent = 'Updated ' + timeAgo(tasks.updated);

    const main = document.getElementById('main');
    main.innerHTML = `
      <!-- Agents -->
      <div class="section">
        <div class="section-label">Agent Team</div>
        <div class="agents" id="agents"></div>
      </div>

      <!-- Tasks -->
      <div class="section">
        <div class="section-label">Active Tasks</div>
        <div class="tasks-grid" id="tasks"></div>
      </div>

      <!-- Roadmap -->
      <div class="section full">
        <div class="section-label">Roadmap</div>
        <div class="roadmap" id="roadmap"></div>
      </div>

      <!-- Activity -->
      <div class="section full">
        <div class="section-label">Recent Activity (GitHub)</div>
        <div class="feed" id="feed"></div>
      </div>
    `;

    // Agents
    const agentsEl = document.getElementById('agents');
    for (const a of tasks.agents) {
      agentsEl.innerHTML += `
        <div class="agent-card ${a.status}">
          <div class="agent-emoji">${a.emoji}</div>
          <div class="agent-info">
            <div class="agent-top">
              <div class="status-dot ${a.status}"></div>
              <span class="agent-name">${a.name}</span>
              <span class="agent-role">${a.role}</span>
            </div>
            <div class="agent-task">${a.current_task}</div>
            <div class="agent-queue">
              ${a.queue.map(q => `<div class="queue-item">${q}</div>`).join('')}
            </div>
          </div>
        </div>`;
    }

    // Tasks
    const tasksEl = document.getElementById('tasks');
    for (const t of tasks.active_tasks) {
      tasksEl.innerHTML += `
        <div class="task-card">
          <div class="task-top">
            <span class="task-title">${t.title}</span>
            <span class="task-id">${t.id}</span>
          </div>
          <div class="task-meta">
            <span class="task-priority">${t.priority}</span>
            <span class="task-assignee">${tasks.agents.find(a=>a.id===t.assigned_to)?.emoji || ''} ${t.assigned_to}</span>
            <span class="task-status ${t.status}">${statusLabel(t.status)}</span>
          </div>
          <div class="task-desc">${t.description}</div>
          ${t.blocked_by ? `<div class="task-blocked">${t.blocked_by}</div>` : ''}
        </div>`;
    }

    // Roadmap
    const roadmapEl = document.getElementById('roadmap');
    for (const p of tasks.roadmap) {
      roadmapEl.innerHTML += `
        <div class="phase-row ${p.status}">
          <div class="phase-name">
            <div class="phase-label">${p.phase} — ${p.name}</div>
          </div>
          <div class="phase-bar-wrap"><div class="phase-bar" style="width:${p.pct}%"></div></div>
          <div class="phase-pct" style="color:${p.pct>0?'#00aaff':'#223'}">${p.pct}%</div>
        </div>`;
    }

    // Activity feed from GitHub
    const feedEl = document.getElementById('feed');
    if (commits.length > 0) {
      for (const c of commits) {
        const msg = c.commit.message.split('\n')[0];
        const ago = timeAgo(c.commit.author.date);
        const type = msg.startsWith('feat') ? '✨' : msg.startsWith('fix') ? '🔧' : msg.startsWith('docs') ? '📝' : msg.startsWith('chore') ? '🔩' : '📦';
        feedEl.innerHTML += `
          <div class="feed-item">
            <span class="feed-icon">${type}</span>
            <span class="feed-msg"><b>${msg.replace(/^(feat|fix|docs|chore|refactor):\s*/,'')}</b></span>
            <span class="feed-time">${ago}</span>
          </div>`;
      }
    } else {
      feedEl.innerHTML = '<div style="color:#223;font-size:.75rem;padding:8px">No recent activity</div>';
    }

  } catch(e) {
    document.getElementById('main').innerHTML = `<div style="padding:40px;color:#f44;grid-column:1/-1">Error loading office: ${e.message}</div>`;
  }
}

load();
setInterval(load, 60000); // auto-refresh every minute
</script>
</body>
</html>
