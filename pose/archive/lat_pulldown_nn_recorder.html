<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XLFitness – Training Recorder</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0d0d;color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    h1{padding:14px 20px;font-size:1.1rem;color:#00aaff;width:100%;text-align:center;border-bottom:2px solid #00aaff;letter-spacing:2px;}

    #loading{padding:40px;text-align:center;}
    #loading p{color:#aaa;margin:12px 0;}
    #progress-bar{width:280px;height:8px;background:#222;border-radius:4px;margin:8px auto;overflow:hidden;}
    #progress-fill{height:100%;background:#00aaff;border-radius:4px;width:0%;transition:width .3s;}
    #load-btn{margin-top:16px;padding:12px 28px;background:#00aaff;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}

    #app{display:none;width:100%;max-width:640px;padding:12px;flex-direction:column;align-items:center;gap:12px;}

    #cam-box{position:relative;width:100%;}
    video{width:100%;border-radius:10px;display:block;transform:scaleX(-1);}
    canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;transform:scaleX(-1);}
    #rec-flash{position:absolute;top:10px;left:10px;font-size:.8rem;font-weight:800;padding:4px 12px;border-radius:6px;display:none;}

    #angle-display{font-size:1.4rem;font-weight:900;color:#00aaff;text-align:center;}

    .counts{display:flex;gap:10px;width:100%;justify-content:center;}
    .count-box{flex:1;background:#111;border-radius:8px;padding:10px;text-align:center;border:1px solid #222;}
    .count-box .n{font-size:1.6rem;font-weight:900;}
    .count-box .l{font-size:.65rem;color:#666;margin-top:2px;}
    .n-good{color:#0f0;} .n-bad{color:#f44;} .n-false{color:#f90;}

    .btns{display:flex;flex-direction:column;gap:10px;width:100%;}
    .rec-btn{padding:18px;border-radius:10px;border:2px solid;font-size:1rem;font-weight:800;cursor:pointer;background:none;color:#fff;letter-spacing:.5px;user-select:none;-webkit-user-select:none;touch-action:none;}
    #bg{border-color:#0f044a;color:#0f0;}
    #bg.held{background:#0f021a;box-shadow:0 0 20px #0f044a;}
    #bb{border-color:#3a0000;color:#f44;}
    #bb.held{background:#1a0000;box-shadow:0 0 20px #3a0000;}
    #bf{border-color:#3a2000;color:#f90;}
    #bf.held{background:#1a1000;box-shadow:0 0 20px #3a2000;}

    #save-btn{width:100%;padding:14px;background:#00aaff;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;}
    #save-btn:disabled{background:#1a1a1a;color:#444;cursor:default;}

    #flip-btn{padding:8px 18px;background:none;border:1px solid #333;color:#aaa;border-radius:8px;cursor:pointer;font-size:.85rem;align-self:flex-end;}

    .hint{font-size:.75rem;color:#555;text-align:center;}
  </style>
</head>
<body>
<h1>XLFITNESS · TRAINING RECORDER</h1>

<div id="loading">
  <p id="load-msg">Press Start to load the camera and AI model.</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <p id="progress-txt" style="font-size:.8rem;color:#556;"></p>
  <button id="load-btn">▶ Start</button>
</div>

<div id="app">
  <div id="cam-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="rec-flash"></div>
  </div>

  <div id="angle-display">Elbow: —°</div>

  <div class="counts">
    <div class="count-box"><div class="n n-good" id="n-good">0</div><div class="l">Good Reps</div></div>
    <div class="count-box"><div class="n n-bad"  id="n-bad">0</div><div class="l">Bad Reps</div></div>
    <div class="count-box"><div class="n n-false" id="n-false">0</div><div class="l">False Moves</div></div>
  </div>

  <div class="btns">
    <button class="rec-btn" id="bg">HOLD — Good Rep ✅</button>
    <button class="rec-btn" id="bb">HOLD — Bad Rep ❌</button>
    <button class="rec-btn" id="bf">HOLD — False Movement ⚡</button>
  </div>

  <p class="hint">Hold a button during the movement. Release when done. Aim for 10 of each.</p>

  <button id="save-btn" disabled>💾 Download Training Data</button>
  <button id="flip-btn">🔄 Flip Camera</button>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const TFJS_URL   = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js';
const POSE_URL   = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js';
const MIN_CONF   = 0.3;
const MIN_FRAMES = 5;

// ── State ─────────────────────────────────────────────────────────────────────
let detector = null, currentStream = null, facingMode = 'user';
let recType = null, recFrames = [], recStart = null;
const data = {good:[], bad:[], false:[]};

// ── DOM ───────────────────────────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const flash    = document.getElementById('rec-flash');
const angleTxt = document.getElementById('angle-display');
const saveBtn  = document.getElementById('save-btn');

// ── Geometry ──────────────────────────────────────────────────────────────────
function ang(a,b,c){
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const d=ab.x*cb.x+ab.y*cb.y, m=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return m?Math.acos(Math.min(1,Math.max(-1,d/m)))*180/Math.PI:180;
}
function kp(pose,i){const p=pose.keypoints[i];return p&&p.score>=MIN_CONF?p:null;}
function elbowAngle(pose){
  const a=[];
  const ls=kp(pose,5),le=kp(pose,7),lw=kp(pose,9);
  const rs=kp(pose,6),re=kp(pose,8),rw=kp(pose,10);
  if(ls&&le&&lw) a.push(ang(ls,le,lw));
  if(rs&&re&&rw) a.push(ang(rs,re,rw));
  return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
const SKEL=[[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
function draw(pose){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const sx=canvas.width/video.videoWidth, sy=canvas.height/video.videoHeight;
  const c=recType==='good'?'#0f0':recType==='bad'?'#f44':recType==='false'?'#f90':'#00aaff';
  ctx.strokeStyle=c; ctx.lineWidth=3;
  for(const [a,b] of SKEL){const pa=pose.keypoints[a],pb=pose.keypoints[b];if(pa?.score>=MIN_CONF&&pb?.score>=MIN_CONF){ctx.beginPath();ctx.moveTo(pa.x*sx,pa.y*sy);ctx.lineTo(pb.x*sx,pb.y*sy);ctx.stroke();}}
  for(const p of pose.keypoints){if(p.score>=MIN_CONF){ctx.beginPath();ctx.arc(p.x*sx,p.y*sy,5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke();}}
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function resize(){canvas.width=video.clientWidth;canvas.height=video.clientHeight;}
async function loop(){
  if(video.readyState>=2){
    const poses=await detector.estimatePoses(video);
    if(poses.length){
      const ea=elbowAngle(poses[0]);
      draw(poses[0]);
      angleTxt.textContent='Elbow: '+(ea!==null?ea+'°':'—');
      if(recType&&ea!==null) recFrames.push({t:Date.now()-recStart,elbow:ea});
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      angleTxt.textContent='No pose detected';
    }
  }
  requestAnimationFrame(loop);
}

// ── Record buttons ────────────────────────────────────────────────────────────
function bind(id,type,label,color){
  const btn=document.getElementById(id);
  const start=e=>{
    e.preventDefault();
    if(recType) return;
    recType=type; recFrames=[]; recStart=Date.now();
    btn.classList.add('held');
    flash.textContent='● REC — '+label;
    flash.style.cssText='display:block;background:'+color+'33;color:'+color+';border:1px solid '+color;
  };
  const stop=e=>{
    e.preventDefault();
    if(recType!==type){btn.classList.remove('held');return;}
    btn.classList.remove('held');
    flash.style.display='none';
    const frames=recFrames.filter(f=>f.elbow!==null);
    if(frames.length>=MIN_FRAMES){
      const angles=frames.map(f=>f.elbow);
      data[type].push({
        label:type==='good'?'good_rep':type==='bad'?'bad_rep':'false_movement',
        frames,
        duration_ms:Date.now()-recStart,
        min_angle:Math.min(...angles),
        max_angle:Math.max(...angles),
        rom:Math.max(...angles)-Math.min(...angles)
      });
      document.getElementById('n-'+type).textContent=data[type].length;
      const min=Math.min(data.good.length,data.bad.length,data.false.length);
      if(min>=5) saveBtn.disabled=false;
    }
    recType=null; recFrames=[];
  };
  btn.addEventListener('mousedown',start); btn.addEventListener('touchstart',start,{passive:false});
  btn.addEventListener('mouseup',stop); btn.addEventListener('mouseleave',stop);
  btn.addEventListener('touchend',stop); btn.addEventListener('touchcancel',stop);
}
bind('bg','good','GOOD REP','#0f0');
bind('bb','bad','BAD REP','#f44');
bind('bf','false','FALSE MOVE','#f90');

// ── Save ──────────────────────────────────────────────────────────────────────
saveBtn.addEventListener('click',()=>{
  const seqs=[...data.good,...data.bad,...data.false];
  const json={machine:'nautilus_nitro_lat_pulldown',version:'2.0',recorded_at:new Date().toISOString(),format:'nn_training',counts:{good_reps:data.good.length,bad_reps:data.bad.length,false_movements:data.false.length,total:seqs.length},sequences:seqs};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(json,null,2)],{type:'application/json'}));
  a.download='nn_training_'+Date.now()+'.json'; a.click();
});

// ── Camera flip ───────────────────────────────────────────────────────────────
async function startCam(facing){
  if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
  const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:640},height:{ideal:480}},audio:false});
  currentStream=s; video.srcObject=s; await video.play(); resize();
}
document.getElementById('flip-btn').addEventListener('click',async()=>{
  facingMode=facingMode==='user'?'environment':'user';
  try{await startCam(facingMode);}catch(e){facingMode=facingMode==='user'?'environment':'user';}
});
window.addEventListener('resize',resize);

// ── Load ──────────────────────────────────────────────────────────────────────
function setProgress(pct,msg){
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-txt').textContent=msg;
}

function loadScript(url){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=url; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

document.getElementById('load-btn').addEventListener('click',async()=>{
  document.getElementById('load-btn').disabled=true;
  document.getElementById('load-msg').textContent='Loading…';
  try{
    setProgress(10,'Loading TensorFlow.js…');
    await loadScript(TFJS_URL);
    setProgress(40,'Loading Pose Detection…');
    await loadScript(POSE_URL);
    setProgress(60,'Starting camera…');
    await startCam(facingMode);
    video.addEventListener('loadedmetadata',resize);
    setProgress(80,'Loading AI model…');
    detector=await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
    );
    setProgress(100,'Ready!');
    await new Promise(r=>setTimeout(r,300));
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    loop();
  }catch(e){
    document.getElementById('load-msg').textContent='Error: '+e.message+' — use Chrome and allow camera';
    document.getElementById('load-msg').style.color='#f44';
    document.getElementById('load-btn').disabled=false;
  }
});
</script>
</body>
</html>
