<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XLFitness – Lat Pulldown Counter</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;color:#fff;font-family:'Segoe UI',Arial,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

    /* Boot */
    #boot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;background:#07090f;}
    #boot h1{font-size:1.4rem;font-weight:900;color:#00aaff;letter-spacing:3px;}
    #boot p{color:#445;font-size:.78rem;}
    #start-btn{padding:16px 44px;background:#00aaff;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;}
    #prog-wrap{width:260px;display:none;flex-direction:column;gap:7px;text-align:center;}
    #prog-bar{height:8px;background:#141e2e;border-radius:4px;overflow:hidden;}
    #prog-fill{height:100%;background:linear-gradient(90deg,#005fcc,#00aaff);width:0%;transition:width .4s;}
    #prog-pct{font-size:.85rem;font-weight:800;color:#00aaff;}
    #prog-txt{font-size:.72rem;color:#445;min-height:1em;}
    #steps{display:none;flex-direction:column;gap:5px;width:260px;}
    .step{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;border:1px solid #1a2a3a;font-size:.77rem;color:#445;transition:all .3s;}
    .step.active{border-color:#00aaff66;color:#00aaff;animation:sp 1s infinite alternate;}
    .step.done{border-color:#0f05;color:#0f0;background:#0f021a;}
    .step.error{border-color:#f445;color:#f44;}
    @keyframes sp{from{border-color:#00aaff22;}to{border-color:#00aaff;}}
    .spin{width:40px;height:40px;border:4px solid #141e2e;border-top-color:#00aaff;border-radius:50%;animation:rot .8s linear infinite;display:none;}
    @keyframes rot{to{transform:rotate(360deg);}}
    #err-txt{color:#f44;font-size:.78rem;text-align:center;max-width:260px;display:none;}

    /* App */
    #app{display:none;flex:1;position:relative;overflow:hidden;background:#000;}
    #video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
    #pose-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:2;}

    /* Top bar */
    #topbar{position:absolute;top:0;left:0;right:0;z-index:10;padding:10px 14px;display:flex;align-items:center;gap:8px;background:linear-gradient(rgba(0,0,0,.75),transparent);}
    .logo{font-size:.85rem;font-weight:900;color:#00aaff;letter-spacing:3px;}
    #sdot{width:8px;height:8px;border-radius:50%;background:#333;margin-left:auto;transition:all .3s;}
    #sdot.seated{background:#f90;box-shadow:0 0 8px #f90;}
    #sdot.active{background:#0f0;box-shadow:0 0 10px #0f0;animation:glow 1s infinite alternate;}
    #stxt{font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#556;}
    #stxt.active{color:#0f0;} #stxt.seated{color:#f90;}
    #cal-badge{font-size:.6rem;padding:2px 8px;border-radius:10px;border:1px solid #00aaff33;color:#00aaff;display:none;}
    @keyframes glow{to{box-shadow:0 0 18px #0f0;}}

    /* Rep counter - bottom left */
    #rep-wrap{position:absolute;bottom:68px;left:14px;z-index:10;}
    #rep-lbl{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);}
    #rep-n{font-size:5.5rem;font-weight:900;line-height:1;text-shadow:0 2px 24px rgba(0,0,0,.9);transition:color .15s,transform .15s;}
    #rep-n.fg{color:#0f0;transform:scale(1.1);}
    #rep-n.fp{color:#f90;transform:scale(1.07);}
    #rep-sub{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:2px;text-shadow:0 1px 6px #000;min-height:1em;}

    /* Phase indicator */
    #phase-banner{position:absolute;top:50px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;}
    #phase-txt{display:inline-block;padding:6px 20px;border-radius:20px;font-size:.75rem;font-weight:800;letter-spacing:2px;background:rgba(0,0,0,.65);border:1px solid #333;color:#556;transition:all .2s;}
    #phase-txt.pulling{background:rgba(0,200,0,.2);border-color:#0f0;color:#0f0;}
    #phase-txt.releasing{background:rgba(0,100,255,.2);border-color:#0af;color:#0af;}

    /* Debug HUD */
    #hud{position:absolute;bottom:68px;right:14px;z-index:10;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:6px 10px;font-size:.63rem;line-height:1.9;}
    .hl{color:rgba(255,255,255,.3);}

    /* NN Brain */
    #brain-wrap{position:absolute;top:50px;right:10px;width:175px;z-index:10;}
    #brain-toggle{width:100%;background:rgba(0,0,0,.72);border:1px solid #9900ff33;border-radius:8px;padding:5px 10px;font-size:.63rem;font-weight:700;color:#aa66ff;cursor:pointer;text-align:center;margin-bottom:4px;}
    #brain-panel{display:none;background:rgba(7,9,20,.9);border:1px solid #9900ff22;border-radius:10px;padding:10px;}
    #brain-panel.open{display:block;}
    #brain-cv{width:100%;height:110px;display:block;border-radius:6px;background:#050810;margin-bottom:8px;}
    .prow{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
    .plbl{font-size:.6rem;color:#667;width:64px;flex-shrink:0;}
    .ptrack{flex:1;height:5px;background:#141e2e;border-radius:3px;overflow:hidden;}
    .pfill{height:100%;border-radius:3px;transition:width .2s;}
    .pval{font-size:.6rem;font-weight:800;width:26px;text-align:right;}
    #nn-verdict{text-align:center;font-size:.7rem;font-weight:800;padding:4px;border-radius:6px;margin-top:5px;border:1px solid #1a2a3a;color:#334;}

    /* Controls */
    #controls{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:10;}
    .cbtn{padding:9px 18px;border-radius:9px;font-size:.76rem;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.72);color:rgba(255,255,255,.55);backdrop-filter:blur(4px);}
    #flip-btn{border-color:rgba(255,255,255,.15);}
  </style>
</head>
<body>

<div id="boot">
  <h1>AI REP COUNTER</h1>
  <p>XLFitness · Lat Pulldown · Neural Network</p>
  <div class="spin" id="spin"></div>
  <div id="prog-wrap">
    <div id="prog-bar"><div id="prog-fill"></div></div>
    <div id="prog-pct">0%</div>
    <div id="prog-txt"></div>
  </div>
  <div id="steps">
    <div class="step" id="s-cfg">📋 Training data</div>

    <div class="step" id="s-go">✅ Ready</div>
  </div>
  <button id="start-btn">▶ START</button>
  <div id="err-txt"></div>
</div>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="pose-canvas"></canvas>

  <div id="topbar">
    <span class="logo">XLFITNESS</span>
    <span id="cal-badge">AUTO-CALIBRATED</span>
    <div id="sdot"></div>
    <span id="stxt">Ready</span>
  </div>

  <div id="rep-wrap">
    <div id="rep-lbl">REPS</div>
    <div id="rep-n">0</div>
    <div id="rep-sub">Tap Start or sit at machine</div>
  </div>

  <div id="phase-banner"><span id="phase-txt">Waiting…</span></div>

  <div id="hud">
    <span class="hl">Elbow </span><b id="d-elbow" style="color:#0af">—</b>
    <span class="hl"> Phase </span><b id="d-phase" style="color:#aaa">up</b><br/>
    <span class="hl">TOP </span><b id="d-top" style="color:#aaa">—</b>
    <span class="hl"> BOT </span><b id="d-bot" style="color:#aaa">—</b>

    <button id="brain-toggle">🧠 NEURAL NETWORK ▾</button>

      <div class="prow"><span class="plbl">Bad Rep</span><div class="ptrack"><div class="pfill" id="pb-bad" style="background:#f44;width:0%"></div></div><span class="pval" id="pv-bad" style="color:#f44">0%</span></div>
      <div class="prow"><span class="plbl">False Move</span><div class="ptrack"><div class="pfill" id="pb-false" style="background:#f90;width:0%"></div></div><span class="pval" id="pv-false" style="color:#f90">0%</span></div>
      <div id="nn-verdict">Waiting…</div>
    </div>
  </div>

  <div id="controls">
    <button class="cbtn" id="reset-btn">↺ Reset</button>
    <button class="cbtn" id="flip-btn">🔄 Flip</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<script>
// ── Neural Network ───────────────────────────────────────────────────────────
const M={"classes":["bad_rep","false_movement","good_rep"],"scaler_mean":[38.550971,122.443689,42.687864,1.98767,101.224757],"scaler_scale":[38.422092,49.200083,20.189907,0.760348,28.570596],"weights":[[[0.7355531381494981,-0.08228008981670798,-1.3177177642463553,2.589510105204825,2.534997603814582],[0.07686866948569239,-0.31889217098614625,-0.6271088689195394,-2.407704711912489,-0.5514028434750671],[0.9745054123669095,-3.228590682565643,-0.6259770082049722,-2.659013552884485,-0.5608121962535999],[-0.9056161557363716,0.4727063898108313,0.7661776670307123,-1.2783008301564034,-0.3851920813162615],[-0.39143443584413384,0.6866224223647953,-0.736726943525139,-14.686247908548392,-0.1146414437268569],[1.583432297763515,-3.2905841041932917,-2.0584460922659047,-1.3586360951083787,0.3129721293951833],[-1.0219457501645834,2.1278146920654564,0.31056710561003104,-1.1007382774358418,-2.6417746523390373],[0.7399137189078976,-3.8348124304075264,-3.0874813109276915,-0.22255417423585835,-1.9362109671704837],[0.15387920010914263,-0.3274528733498624,-2.172009467121197,0.6081292777796296,-2.3370255747161273],[1.3661467875559905,-1.9282426483663861,-0.922850507235714,-0.2489337115115764,0.8961735613342964],[-1.9166788281009934,-0.13082896675032019,2.0195694820403167,5.4043789802152,-1.2604221539000366],[1.1731846428829522,-0.5495701867419385,-0.005301847051712842,0.8606762336552408,0.35459429843411816]],[[-0.840215668842268,2.041281186127967,1.5497861308819116,1.4898545615450678,6.579658645946109,0.4711913949903742,0.29620584630458974,-1.1779763623676838,1.0095405013403749,-0.7058208100424563,-1.5817373214744233,0.4789563869333899],[0.8959753961206475,0.12833937467146192,0.2026164316590598,0.035254264226767126,-6.82062245494127,-0.8473021518197674,2.2573412995432447,1.8397982886022322,0.03059756126383972,1.7872327272963089,-2.0000711792980894,0.7299457721975057],[-0.10349390077805481,-0.44205569584620147,-0.3985967839669308,-0.5196170929198589,-0.36317821419381113,0.10863917522597753,-1.1986919339197382,-0.03942720869324422,-0.24880523541897473,-0.685369174293107,-0.919507854310577,0.14619714128619496],[-0.18102311663426865,-0.5652201958768401,0.5118689821037379,-0.689201458278113,2.022024756768973,0.10212344211422081,-1.3374218781096028,0.02532074752539694,-0.21732633545924826,0.5610084384949602,-0.053751050714289955,-0.006614757452609679],[-0.8848418116850513,-0.20381670580524328,-0.012038067967352883,-0.6683585325315717,-0.5635756366540103,-0.21307263143895527,-0.7147391737413827,-1.5532997802162454,3.403586943199426,-0.697188989294392,1.512803765907451,-0.8778780580409755],[-1.2300548544601242,-0.2134379821553661,-0.16534082751521484,0.14845494143054888,-1.003976048398359,-0.4645302886260406,-1.6245263112836412,-0.3303548962400715,0.99335294815477,-0.0023112145337818185,1.3521959702650226,-0.04254471140904132],[-0.11022119203347,-3.386193098118284,1.2578678619681962,-1.109201063327187,-5.541761307336385,0.6961548728059379,-0.9602352345535559,-1.0850185715888458,0.4865053591370835,0.8013277535625423,-3.201697943555057,-0.8652711248307443],[-0.44711347738181256,0.2522164846142357,-0.020837454244849316,-0.01246397634079747,-0.3586144840314752,0.029341319373769086,0.8753842816108969,-0.8470789655346468,0.27739974278327706,-0.3551752601720058,-0.5635997542667498,-0.36587623439154127]],[[3.229261761942651,-0.39465155385968476,0.4376905859182338,0.38285688072517743,1.5125500155945246,2.1036511922151684,0.5317044427574403,0.9764201881203034],[-5.747842050046475,4.3372447047559,0.22977929615296436,0.24534449863054894,-4.196658298091416,-2.035220157283878,2.924317285738913,-0.02247549771868596],[3.2780023017514854,-5.2829992235938565,0.15923015152876585,0.15780022338200397,1.7460647680655303,1.305629291763246,-3.582697044926651,0.6169632567416055]]],"biases":[[-0.7983328423624827,-0.7459439746438443,-0.9830856928645555,-1.5434930611942956,-0.3987283638337163,-0.5840160412940504,0.701621509211516,0.704308695468621,0.3847751569251879,-2.237881009852468,-0.29155718814174697,-0.695193712545157],[-1.1623671867967063,1.6796765731043957,-0.9383270422154014,0.4886132218483841,0.33618036057780226,0.929999794029703,-0.2693988901207702,-0.5406464262695223],[0.10856555103036028,-1.955889126267632,0.9430447263238027]],"features":["min_angle","rom","std_angle","duration_s","avg_angle"],"trained_on":{"good_rep":55,"bad_rep":61,"false_movement":90,"total":206},"cv_accuracy":76.7};
function relu(x){return x.map(v=>Math.max(0,v));}
function softmax(x){const m=Math.max(...x),e=x.map(v=>Math.exp(v-m)),s=e.reduce((a,b)=>a+b,0);return e.map(v=>v/s);}
function mv(W,x){return W.map(r=>r.reduce((s,w,i)=>s+w*x[i],0));}
function nnRun(minA,rom,std,durS,avg){
  const raw=[minA,rom,std,durS,avg];
  let h=raw.map((v,i)=>(v-M.scaler_mean[i])/M.scaler_scale[i]);
  const acts=[h.map(v=>Math.min(1,Math.max(0,(v+2)/4)))];
  for(let i=0;i<M.weights.length;i++){
    const next=mv(M.weights[i],h).map((v,j)=>v+M.biases[i][j]);
    if(i<M.weights.length-1){h=relu(next);const mx=Math.max(...h.map(Math.abs))||1;acts.push(h.map(v=>Math.min(1,Math.max(0,v/mx))));}
    else{h=softmax(next);acts.push(h);}
  }
  return{acts,probs:h};
}

// ── Brain visualiser ─────────────────────────────────────────────────────────
const LAYERS=[5,12,8,3];
let bActs=LAYERS.map(n=>new Array(n).fill(0));
let pulses=[];
const bCv=document.getElementById('brain-cv');
const bCtx=bCv.getContext('2d');
document.getElementById('brain-toggle').addEventListener('click',()=>{document.getElementById('brain-panel').classList.toggle('open');});
function nPos(l,n,cw,ch){const x=(l+0.5)/LAYERS.length*cw,c=LAYERS[l],g=Math.min(ch/(c+1),12);return{x,y:(ch-(c-1)*g)/2+n*g};}
function drawBrain(){
  const cw=bCv.width||155,ch=bCv.height||110;
  bCtx.fillStyle='#050810';bCtx.fillRect(0,0,cw,ch);
  for(let l=0;l<LAYERS.length-1;l++)for(let i=0;i<LAYERS[l];i++)for(let j=0;j<LAYERS[l+1];j++){
    const p1=nPos(l,i,cw,ch),p2=nPos(l+1,j,cw,ch),act=(bActs[l][i]+bActs[l+1][j])/2;
    const w=M.weights[l][j]?M.weights[l][j][i]||0:0;
    bCtx.strokeStyle=w>=0?`rgba(0,170,255,${.04+act*.35})`:`rgba(255,60,60,${.04+act*.35})`;
    bCtx.lineWidth=.4+act*1.2;bCtx.beginPath();bCtx.moveTo(p1.x,p1.y);bCtx.lineTo(p2.x,p2.y);bCtx.stroke();
  }
  pulses=pulses.filter(p=>p.t<1);
  pulses.forEach(p=>{p.t+=.06;const x=p.x1+(p.x2-p.x1)*p.t,y=p.y1+(p.y2-p.y1)*p.t;bCtx.beginPath();bCtx.arc(x,y,2.5,0,Math.PI*2);bCtx.fillStyle=p.c;bCtx.fill();});
  for(let l=0;l<LAYERS.length;l++)for(let n=0;n<LAYERS[l];n++){
    const pos=nPos(l,n,cw,ch),act=bActs[l]?bActs[l][n]:0;
    const nc=l===LAYERS.length-1?(n===2?`rgba(0,255,0,${.3+act*.7})`:n===0?`rgba(255,60,60,${.3+act*.7})`:`rgba(255,150,0,${.3+act*.7})`):`rgba(${Math.floor(act*255)},${Math.floor(act*160+80)},255,${.4+act*.5})`;
    if(act>.5){bCtx.shadowColor=nc;bCtx.shadowBlur=7;}
    bCtx.beginPath();bCtx.arc(pos.x,pos.y,3+act*2,0,Math.PI*2);bCtx.fillStyle=nc;bCtx.fill();bCtx.shadowBlur=0;
    if(l===0){bCtx.fillStyle='rgba(80,130,180,.7)';bCtx.font='6px Arial';bCtx.textAlign='right';bCtx.fillText(['min°','ROM','std','dur','avg'][n],pos.x-5,pos.y+2);}
    if(l===LAYERS.length-1){bCtx.fillStyle=['#f44','#f90','#0f0'][n];bCtx.font='bold 6px Arial';bCtx.textAlign='left';bCtx.fillText(['BAD','FALSE','GOOD'][n],pos.x+5,pos.y+2);}
  }
  bCtx.textAlign='left';
}
(function ab(){drawBrain();requestAnimationFrame(ab);})();
function firePulse(c){for(let l=0;l<LAYERS.length-1;l++)for(let i=0;i<LAYERS[l];i++)for(let j=0;j<LAYERS[l+1];j++)if(Math.random()<.2){const p1=nPos(l,i,bCv.width,bCv.height),p2=nPos(l+1,j,bCv.width,bCv.height);pulses.push({x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,t:0,c});}}
function resizeBrain(){bCv.width=bCv.clientWidth||155;bCv.height=110;}
function updateBrain(minA,rom,std,durS,avg){
  try{
    const{acts,probs}=nnRun(minA,rom,std,durS,avg);
    bActs=acts;
    const[pb,pf,pg]=[probs[0],probs[1],probs[2]];
    document.getElementById('pb-good').style.width=Math.round(pg*100)+'%';
    document.getElementById('pb-bad').style.width=Math.round(pb*100)+'%';
    document.getElementById('pb-false').style.width=Math.round(pf*100)+'%';
    document.getElementById('pv-good').textContent=Math.round(pg*100)+'%';
    document.getElementById('pv-bad').textContent=Math.round(pb*100)+'%';
    document.getElementById('pv-false').textContent=Math.round(pf*100)+'%';
    // classes order matches LabelEncoder: bad_rep=0, false_movement=1, good_rep=2
    const best=pg>pb&&pg>pf?'good':pb>pf?'bad':'false';
    const v=document.getElementById('nn-verdict');
    if(best==='good'){v.textContent='✅ GOOD REP';v.style.cssText='border-color:#0f0;color:#0f0;';}
    else if(best==='bad'){v.textContent='⚠ BAD REP';v.style.cssText='border-color:#f44;color:#f44;';}
    else{v.textContent='⚡ FALSE MOVE';v.style.cssText='border-color:#f90;color:#f90;';}
    return best;
  }catch(e){return'good';}
}

// ── Pose helpers ─────────────────────────────────────────────────────────────
// MoveNet keypoints: 0=nose,1=l_eye,2=r_eye,3=l_ear,4=r_ear,
// 5=l_shoulder,6=r_shoulder,7=l_elbow,8=r_elbow,9=l_wrist,10=r_wrist,
// 11=l_hip,12=r_hip,13=l_knee,14=r_knee,15=l_ankle,16=r_ankle
const SKEL=[[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
const CONF=0.2; // lower threshold — more forgiving for side-on angles

function gkp(pose,i){const p=pose.keypoints[i];return p&&p.score>=CONF?p:null;}

function calcAngle(a,b,c){
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const d=ab.x*cb.x+ab.y*cb.y,m=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return m>0?Math.acos(Math.min(1,Math.max(-1,d/m)))*180/Math.PI:null;
}

// Returns {angle, elbowPx, shoulderPx, wristPx, side, confidence}
function getBestArm(pose,sx,sy){
  const arms=[];
  const ls=gkp(pose,5),le=gkp(pose,7),lw=gkp(pose,9);
  const rs=gkp(pose,6),re=gkp(pose,8),rw=gkp(pose,10);
  if(ls&&le&&lw){
    const a=calcAngle(ls,le,lw);
    if(a!==null)arms.push({angle:a,conf:(ls.score+le.score+lw.score)/3,
      ePx:{x:le.x*sx,y:le.y*sy},sPx:{x:ls.x*sx,y:ls.y*sy},wPx:{x:lw.x*sx,y:lw.y*sy},
      eN:{x:le.x,y:le.y},wN:{x:lw.x,y:lw.y},sN:{x:ls.x,y:ls.y},side:'L'});
  }
  if(rs&&re&&rw){
    const a=calcAngle(rs,re,rw);
    if(a!==null)arms.push({angle:a,conf:(rs.score+re.score+rw.score)/3,
      ePx:{x:re.x*sx,y:re.y*sy},sPx:{x:rs.x*sx,y:rs.y*sy},wPx:{x:rw.x*sx,y:rw.y*sy},
      eN:{x:re.x,y:re.y},wN:{x:rw.x,y:rw.y},sN:{x:rs.x,y:rs.y},side:'R'});
  }
  if(!arms.length)return null;
  arms.sort((a,b)=>b.conf-a.conf);
  return arms[0];
}

// ── Canvas overlay ────────────────────────────────────────────────────────────
// Canvas draws video frame + skeleton directly — no CSS overlay positioning issues.
const video=document.getElementById('video');
const pCv=document.getElementById('pose-canvas');
const pCtx=pCv.getContext('2d');

function getSXSY(){
  const cw=window.innerWidth,ch=window.innerHeight;
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  const scale=Math.min(cw/vw,ch/vh);
  return{sx:scale,sy:scale,ox:(cw-vw*scale)/2,oy:(ch-vh*scale)/2};
}

function syncCanvas(){
  // Use window dimensions — canvas is position:fixed covering full viewport
  pCv.width=window.innerWidth;
  pCv.height=window.innerHeight;
}
window.addEventListener('resize',()=>{syncCanvas();resizeBrain();});
window.addEventListener('orientationchange',()=>setTimeout(()=>{syncCanvas();resizeBrain();},300));

function drawPose(pose,arm,color){
  pCtx.clearRect(0,0,pCv.width,pCv.height);
  if(!pCv.width||!video.videoWidth)return;
  const {sx,sy,ox,oy}=getSXSY();
  const px=(kp)=>({x:kp.x*sx+ox,y:kp.y*sy+oy});

  // Skeleton
  pCtx.strokeStyle=color;pCtx.lineWidth=3;
  for(const[a,b]of SKEL){
    const pa=pose.keypoints[a],pb=pose.keypoints[b];
    if(pa?.score>=CONF&&pb?.score>=CONF){
      const pa2=px(pa),pb2=px(pb);
      pCtx.beginPath();pCtx.moveTo(pa2.x,pa2.y);pCtx.lineTo(pb2.x,pb2.y);pCtx.stroke();
    }
  }
  // Joints
  for(const p of pose.keypoints){
    if(p.score>=CONF){
      const pp=px(p);
      pCtx.beginPath();pCtx.arc(pp.x,pp.y,5,0,Math.PI*2);
      pCtx.fillStyle='#fff';pCtx.fill();
      pCtx.strokeStyle=color;pCtx.lineWidth=2;pCtx.stroke();
    }
  }

  // Angle arc on the best arm's elbow
  if(arm){
    const ep={x:arm.eN.x*sx+ox,y:arm.eN.y*sy+oy};
    const sp={x:arm.sN.x*sx+ox,y:arm.sN.y*sy+oy};
    const wp={x:arm.wN.x*sx+ox,y:arm.wN.y*sy+oy};

    // Draw arc
    const angle=arm.angle*Math.PI/180;
    const a1=Math.atan2(sp.y-ep.y,sp.x-ep.x);
    const a2=Math.atan2(wp.y-ep.y,wp.x-ep.x);
    const r=28;
    pCtx.beginPath();pCtx.arc(ep.x,ep.y,r,a1,a2,false);
    pCtx.strokeStyle=arm.angle<90?'rgba(0,255,100,.8)':'rgba(0,170,255,.6)';
    pCtx.lineWidth=3;pCtx.stroke();

    // Angle label at elbow
    pCtx.fillStyle='#fff';
    pCtx.font='bold 14px Arial';
    pCtx.textAlign='center';
    pCtx.textBaseline='middle';
    const midA=(a1+a2)/2;
    const lx=ep.x+Math.cos(midA)*44,ly=ep.y+Math.sin(midA)*44;
    // Drop shadow
    pCtx.shadowColor='rgba(0,0,0,.8)';pCtx.shadowBlur=4;
    pCtx.fillText(Math.round(arm.angle)+'°',lx,ly);
    pCtx.shadowBlur=0;
    pCtx.textAlign='left';pCtx.textBaseline='alphabetic';
  }
}

// ── EMA smoother ──────────────────────────────────────────────────────────────
// Exponential moving average — less lag than rolling average
function makeEMA(alpha){
  let val=null;
  return{
    update(v){if(v===null)return val;val=val===null?v:alpha*v+(1-alpha)*val;return val;},
    get(){return val;},
    reset(){val=null;}
  };
}

// ── Rep detection — simple hysteresis, wrist-position gated ──────────────────
// TOP: angle above this = arm extended (bar released)
// BOT: angle below this = arm contracted (bar pulled to chest)
// A rep = crossing BOT then back above TOP, with MIN_MS between
// GATE: wrists must be near/above shoulders when rep starts (real lat pulldown position)
const TOP=125, BOT=95, MIN_MS=400, MAX_MS=15000;

const emaAngle=makeEMA(0.3);
let phase='up'; // 'up' = waiting for pull, 'down' = bar pulled, waiting for release
let repStart=null, repMin=999, repMax=0;
let repBuf=[], repCount=0, frameN=0;
let lastArm=null; // updated each frame from main loop

const repNEl=document.getElementById('rep-n');
const repSubEl=document.getElementById('rep-sub');
const sdot=document.getElementById('sdot');
const stxt=document.getElementById('stxt');
const phaseTxt=document.getElementById('phase-txt');

function setState(s){
  sdot.className=s;stxt.className=s;
  if(s==='waiting')stxt.textContent='Ready';
  else if(s==='active')stxt.textContent='Counting';
}

function processAngle(rawAngle){
  if(rawAngle===null)return;
  const ea=emaAngle.update(rawAngle);
  if(ea===null)return;

  repBuf.push(ea);if(repBuf.length>300)repBuf.shift();

  // HUD
  document.getElementById('d-elbow').textContent=Math.round(ea)+'°';
  document.getElementById('d-phase').textContent=phase==='up'?'releasing':'PULLING';
  document.getElementById('d-top').textContent=TOP+'°';
  document.getElementById('d-bot').textContent=BOT+'°';

  if(phase==='up'){
    // Waiting for bar to be pulled down (angle drops below BOT)
    repMax=Math.max(repMax,ea);
    phaseTxt.textContent='↓ Pull the bar down';
    phaseTxt.className='releasing';
    if(ea<BOT){
      // Gate: check wrists are near/above shoulders (real lat pulldown grip position)
      // In image coords Y increases downward, so wrist above shoulder = wrist.y < shoulder.y
      let wristOk=true;
      if(lastArm){
        const wy=lastArm.wN.y, sy2=lastArm.sN.y;
        // Allow wrist up to 20% of frame BELOW shoulder (generous tolerance)
        wristOk = wy < sy2 + 0.20;
      }
      if(wristOk){
        phase='down';repMin=ea;repStart=Date.now();
        phaseTxt.textContent='↑ Release back up';
        phaseTxt.className='pulling';
      }
    }
  }else{
    // Bar pulled — waiting for release back up (angle rises above TOP)
    repMin=Math.min(repMin,ea);
    const dur=repStart?Date.now()-repStart:0;
    // Safety reset if stuck too long
    if(dur>MAX_MS){phase='up';repMax=ea;repMin=999;emaAngle.reset();return;}

    if(ea>TOP&&dur>=MIN_MS){
      // ✅ Rep counted
      const rom=Math.round(repMax-repMin);
      const slice=repBuf.slice(-Math.max(10,Math.round(dur/33)));
      const avg=slice.reduce((a,b)=>a+b,0)/slice.length;
      const std=Math.sqrt(slice.reduce((s,v)=>s+(v-avg)**2,0)/slice.length);
      updateBrain(repMin,rom,std,dur/1000,avg);

      // NN gate: block if high-confidence false movement
      const nnResult=updateBrain(repMin,rom,std,dur/1000,avg);
      if(nnResult==='false'||nnResult==='bad'){
        // NN says this is a false movement — don't count it
        repSubEl.textContent=nnResult==='bad'?'⚠ Bad form — not counted':'⚡ False movement — not counted';
        phase='up';repMax=ea;repMin=999;
        phaseTxt.textContent='↓ Pull the bar down';
        phaseTxt.className='releasing';
        return;
      }
      const isGood=nnResult==='good'&&rom>=40&&repMin<BOT+10;
      repCount++;
      repNEl.textContent=repCount;
      repSubEl.textContent=isGood?'✓ Good rep!':'Rep counted';
      repNEl.className=isGood?'fg':'fp';
      setTimeout(()=>{repNEl.className='';},500);
      firePulse(isGood?'#0f0':'#fa0');
      setState('active');

      phase='up';repMax=ea;repMin=999;
      phaseTxt.textContent='↓ Pull the bar down';
      phaseTxt.className='releasing';
    }
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let detector=null;
async function loop(){
  if(video.readyState>=2&&detector){
    const poses=await detector.estimatePoses(video);
    if(poses.length>0){
      const pose=poses[0];
      const{sx,sy,ox,oy}=getSXSY();
      const arm=getBestArm(pose,sx,sy);
      if(arm)lastArm=arm; // keep latest arm data for wrist gate check
      const color=sdot.className==='active'?'rgba(0,255,100,.85)':'rgba(0,170,255,.75)';
      drawPose(pose,arm,color);
      // Always process angle — no gating
      processAngle(arm?arm.angle:null);

      // Brain live update every 10 frames
      if(frameN++%8===0&&repBuf.length>=5){
        const a=repBuf.slice(-50),avg=a.reduce((x,y)=>x+y,0)/a.length;
        const std=Math.sqrt(a.reduce((s,v)=>s+(v-avg)**2,0)/a.length);
        updateBrain(repMin<900?repMin:80,repMax-repMin>0?repMax-repMin:40,std,2.5,avg);
      }
    }else{
      pCtx.clearRect(0,0,pCv.width,pCv.height);
      document.getElementById('d-elbow').textContent='—';
      emaAngle.reset();
    }
  }
  requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function resetRep(){
  phase='up';repMax=0;repMin=999;repStart=null;repBuf=[];
  emaAngle.reset();
  phaseTxt.textContent='↓ Pull the bar down';
  phaseTxt.className='releasing';
}

document.getElementById('reset-btn').addEventListener('click',()=>{
  repCount=0;resetRep();
  repNEl.textContent='0';repNEl.className='';
  repSubEl.textContent='Counting automatically';
  document.getElementById('nn-verdict').textContent='Waiting…';
  document.getElementById('nn-verdict').style.cssText='';
  setState('waiting');
});

let stream=null,facing='environment';
async function startCam(f){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:false});}
  catch(e){stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});}
  video.srcObject=stream;await video.play();setTimeout(()=>syncRetry(15),200);
}
document.getElementById('flip-btn').addEventListener('click',async()=>{
  facing=facing==='environment'?'user':'environment';
  try{await startCam(facing);}catch(e){}
});

// ── Boot ──────────────────────────────────────────────────────────────────────
const TRAINING_URL='https://raw.githubusercontent.com/XLDonkey/XLFitness_pose-estimation/main/machine_configs/nautilus_nitro_lat_pulldown_training.json';
function setStep(id,s){const el=document.getElementById(id);el.classList.remove('active','done','error');el.classList.add(s);}
function setProg(pct,msg){document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-pct').textContent=pct+'%';document.getElementById('prog-txt').textContent=msg;}

document.getElementById('start-btn').addEventListener('click',async()=>{
  document.getElementById('start-btn').style.display='none';
  document.getElementById('spin').style.display='block';
  document.getElementById('prog-wrap').style.display='flex';
  document.getElementById('steps').style.display='flex';
  const errEl=document.getElementById('err-txt');
  try{
    setStep('s-cfg','active');setProg(5,'Loading training config…');
    try{const r=await fetch(TRAINING_URL,{cache:'no-cache'});if(r.ok){const j=await r.json();if(j.summary){TOP=j.summary.top_threshold??138;BOT=Math.max(70,j.summary.bottom_threshold??78);}}}catch(e){}
    setStep('s-cfg','done');setProg(20,'Config loaded ✓');

    setStep('s-cam','active');setProg(25,'Starting camera…');
    await startCam(facing);
    setStep('s-cam','done');setProg(40,'Camera ready ✓');

    setStep('s-ai','active');setProg(45,'Loading AI model…');
    let fp=45;const ft=setInterval(()=>{if(fp<88){fp++;setProg(fp,'Loading AI model… (~15–20s on mobile)');}},350);
    detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING});
    clearInterval(ft);
    setStep('s-ai','done');setProg(95,'AI model ready ✓');

    resizeBrain();
    setStep('s-go','done');setProg(100,'All systems go!');
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('boot').style.display='none';
    document.getElementById('app').style.display='block';
    // Must size canvas AFTER app is visible — requestAnimationFrame ensures layout is done
    syncCanvas();resizeBrain();
    repSubEl.textContent='Counting automatically';
    setState('waiting');
    loop();
  }catch(e){
    document.getElementById('spin').style.display='none';
    document.getElementById('start-btn').style.display='block';
    errEl.style.display='block';errEl.textContent='❌ '+e.message+' — use Chrome & allow camera';
    ['s-cfg','s-cam','s-ai','s-go'].forEach(id=>{if(document.getElementById(id).classList.contains('active'))setStep(id,'error');});
  }
});
</script>
