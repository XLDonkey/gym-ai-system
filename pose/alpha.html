<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>XL Fitness — AI Rep Counter</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;background:#0d1117;color:#fff;font-family:'Inter',system-ui,sans-serif;}

    #boot{position:fixed;inset:0;z-index:99;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
    .b-logo{font-size:1.1rem;font-weight:900;letter-spacing:6px;color:#8b5cf6;}
    .b-sub{font-size:.6rem;letter-spacing:3px;color:#555;text-transform:uppercase;}
    .bar-wrap{width:200px;height:4px;background:#1e2235;border-radius:2px;overflow:hidden;}
    .bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);width:0;transition:width .4s;}
    #boot-msg{font-size:.72rem;color:#555;letter-spacing:1px;}
    #boot-err{color:#ef4444;font-size:.72rem;text-align:center;max-width:280px;line-height:1.7;display:none;}
    #retry{padding:12px 32px;background:#8b5cf6;border:none;border-radius:10px;color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;display:none;margin-top:8px;}

    #app{display:none;height:100%;flex-direction:row;}

    /* LEFT PANEL */
    #stats{width:280px;flex-shrink:0;background:#141825;display:flex;flex-direction:column;padding:20px 18px;overflow-y:auto;}
    .xl-logo{font-size:1.1rem;font-weight:700;letter-spacing:4px;color:#8b5cf6;text-transform:uppercase;}
    .xl-sub{font-size:.65rem;color:#9ca3af;letter-spacing:1px;margin-top:2px;}
    .divider{height:1px;background:#2d3348;margin:14px 0;}
    .sh{font-size:.6rem;font-weight:600;color:#9ca3af;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}

    /* Angle */
    #aval{font-size:2.2rem;font-weight:900;color:#8b5cf6;line-height:1;display:block;text-align:center;}
    #asub{font-size:.55rem;color:#9ca3af;letter-spacing:2px;text-transform:uppercase;display:block;text-align:center;margin-top:2px;margin-bottom:8px;}
    #abar-w{width:100%;height:6px;background:#1f2937;border-radius:3px;overflow:hidden;margin-bottom:16px;}
    #abar{height:100%;border-radius:3px;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);width:0%;transition:width .1s;}

    /* V-shape */
    .vwrap{display:flex;align-items:center;justify-content:center;gap:4px;height:40px;margin-bottom:8px;}
    #arm-l{width:44px;height:9px;background:#6366f1;border-radius:3px;transform-origin:right center;transform:rotate(-30deg);transition:transform .1s,background .1s;}
    #arm-r{width:44px;height:9px;background:#6366f1;border-radius:3px;transform-origin:left center;transform:rotate(30deg);transition:transform .1s,background .1s;}

    /* Debug */
    #debug-row{text-align:center;font-size:.72rem;color:#9ca3af;line-height:1.8;margin-bottom:14px;}
    #dbg-phase{color:#f97316;font-weight:700;}

    /* Brain */
    #brain-cv{width:100%;height:110px;display:block;background:#0d1117;border-radius:4px;border:1px solid #2d3348;margin-bottom:12px;}
    .prob-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .pl{font-size:.68rem;color:#9ca3af;width:40px;flex-shrink:0;}
    .pt{flex:1;height:7px;background:#374151;border-radius:3px;overflow:hidden;}
    .pf{height:100%;border-radius:3px;transition:width .25s;}
    .pv{font-size:.68rem;font-weight:600;width:32px;text-align:right;}
    #nn-status{width:100%;padding:10px;border-radius:8px;border:2px solid #f59e0b;color:#f59e0b;font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:6px;transition:all .25s;background:transparent;}

    .panel-desc{margin-top:auto;padding-top:16px;font-size:.82rem;font-weight:700;font-style:italic;color:#e5e7eb;line-height:1.4;}

    /* RIGHT — camera */
    #cam{flex:1;position:relative;background:#000;min-width:0;display:flex;flex-direction:column;}
    #cam-view{flex:1;position:relative;overflow:hidden;}
    #video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
    #cvs{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;}

    #ldot{position:absolute;top:12px;right:12px;z-index:5;display:flex;align-items:center;gap:5px;}
    #dot{width:8px;height:8px;border-radius:50%;background:#333;}
    #dot.live{background:#22c55e;box-shadow:0 0 10px #22c55e;animation:glow 1.2s infinite alternate;}
    @keyframes glow{to{box-shadow:0 0 20px #22c55e;}}
    #dtxt{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;}
    #dtxt.live{color:#22c55e;}

    /* BOTTOM BAR */
    #bottom{height:76px;background:#1e2235;border-top:1px solid #2d3348;display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;}
    #rn-wrap{flex-shrink:0;min-width:70px;}
    #rn{font-size:3.8rem;font-weight:900;line-height:1;color:#fff;transition:color .12s,transform .12s;}
    #rn.pop{color:#22c55e;transform:scale(1.1);}
    #rverdict{font-size:.6rem;color:#9ca3af;margin-top:1px;}
    #phase-wrap{flex:1;display:flex;justify-content:center;}
    #phase{padding:9px 22px;border-radius:24px;font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:2px solid #8b5cf6;color:#f59e0b;white-space:nowrap;transition:all .25s;}
    #phase.pull{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.08);}
    #phase.rel{border-color:#8b5cf6;color:#f59e0b;background:rgba(139,92,246,.08);}
    .ctrl-btn{display:flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid #3f4760;background:#2d3348;color:#d1d5db;}
  </style>
</head>
<body>

<div id="boot">
  <div class="b-logo">XL FITNESS</div>
  <div class="b-sub">AI Rep Counter · Alpha Demo</div>
  <div class="bar-wrap"><div class="bar" id="bbar"></div></div>
  <div id="boot-msg">Loading…</div>
  <div id="boot-err"></div>
  <button id="retry" onclick="boot()">↺ Retry</button>
</div>

<div id="app">
  <!-- LEFT PANEL -->
  <div id="stats">
    <div class="xl-logo">XLFITNESS</div>
    <div class="xl-sub">Neural Network</div>
    <div class="divider"></div>

    <div class="sh">Elbow Angle</div>
    <div class="vwrap"><div id="arm-l"></div><div id="arm-r"></div></div>
    <span id="aval">—</span>
    <span id="asub">degrees</span>
    <div id="abar-w"><div id="abar"></div></div>

    <div id="debug-row">Phase: <span id="dbg-phase">up</span><br/>Max: <span id="dbg-max">—</span>° · Min: <span id="dbg-min">—</span>°</div>

    <div class="sh">Neural Network</div>
    <canvas id="brain-cv"></canvas>
    <div class="sh">Rep Progress</div>
    <div style="width:100%;height:14px;background:#1f2937;border-radius:7px;overflow:hidden;margin-bottom:8px;">
      <div id="prog-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:7px;transition:width .3s ease;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
      <span style="font-size:.62rem;color:#9ca3af;">0</span>
      <span id="prog-label" style="font-size:.62rem;color:#22c55e;font-weight:700;">0 reps</span>
      <span id="prog-target" style="font-size:.62rem;color:#9ca3af;">10</span>
    </div>
    <div id="nn-status">⚡ ANALYSING…</div>

    <div class="panel-desc">Automatic Rep and Set Tracking. Together with Face and Weight ID for fully autonomous Tracking.</div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="cam">
    <div id="cam-view">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="cvs"></canvas>
      <div id="ldot"><div id="dot"></div><span id="dtxt">Detecting</span></div>
    </div>
    <div id="bottom">
      <div id="rn-wrap"><div id="rn">0</div><div id="rverdict"></div></div>
      <div id="phase-wrap"><div id="phase">↓ PULL BAR DOWN</div></div>
      <button class="ctrl-btn" onclick="doReset()">↺ Reset</button>
      <button class="ctrl-btn" onclick="flipCam()">🔄 Flip</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

function relu(x){return x.map(v=>Math.max(0,v));}
function softmax(x){const m=Math.max(...x),e=x.map(v=>Math.exp(v-m)),s=e.reduce((a,b)=>a+b,0);return e.map(v=>v/s);}
function mv(W,x){return W.map(r=>r.reduce((s,w,i)=>s+w*x[i],0));}
function nnRun(min,rom,std,dur,avg){
  let h=[min,rom,std,dur,avg].map((v,i)=>(v-M.scaler_mean[i])/M.scaler_scale[i]);
  const acts=[h.map(v=>Math.min(1,Math.max(0,(v+2)/4)))];
  for(let i=0;i<M.weights.length;i++){

    const{acts,probs}=nnRun(min,rom,std,dur,avg);
    bActs=acts;
    const[pb,pf,pg]=[probs[0],probs[1],probs[2]];
    document.getElementById('pbg').style.width=Math.round(pg*100)+'%';
    document.getElementById('pbb').style.width=Math.round(pb*100)+'%';
    document.getElementById('pbf').style.width=Math.round(pf*100)+'%';
    document.getElementById('pvg').textContent=Math.round(pg*100)+'%';
    document.getElementById('pvb').textContent=Math.round(pb*100)+'%';
    document.getElementById('pvf').textContent=Math.round(pf*100)+'%';
    const v=document.getElementById('nn-status');
    const best=pg>pb&&pg>pf?'good':pb>pf?'bad':'false';
    if(best==='good'){v.textContent='✅ GOOD REP';v.style.cssText='border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.07)';}
    else if(best==='bad'){v.textContent='⚠ BAD FORM';v.style.cssText='border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.07)';}
    else{v.textContent='⚡ FALSE MOVE';v.style.cssText='border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.07)';}
  }catch(e){}
}

// ── Pose ──────────────────────────────────────────────────────────────────────
const SKEL=[[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12]];
const CONF=0.15;
const video=document.getElementById('video'),cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
function syncCvs(){
  const v=document.getElementById('cam-view');
  cvs.width=v.offsetWidth||window.innerWidth-280;
  cvs.height=v.offsetHeight||window.innerHeight-76;
  bCv.width=bCv.clientWidth||232;
}
window.addEventListener('resize',syncCvs);
window.addEventListener('orientationchange',()=>setTimeout(syncCvs,300));
function kp(pose,i){const p=pose.keypoints[i];return p?.score>=CONF?p:null;}
function ang3(a,b,c){
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const d=ab.x*cb.x+ab.y*cb.y,m=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return m?Math.acos(Math.min(1,Math.max(-1,d/m)))*180/Math.PI:null;
}
function bestArm(pose){
  const arms=[];
  for(const[si,ei,wi]of[[5,7,9],[6,8,10]]){
    const s=kp(pose,si),e=kp(pose,ei),w=kp(pose,wi);
    if(s&&e&&w){const a=ang3(s,e,w);if(a!=null)arms.push({angle:a,conf:(s.score+e.score+w.score)/3,sN:s,eN:e,wN:w});}
  }
  return arms.sort((a,b)=>b.conf-a.conf)[0]||null;
}
function proj(){
  const sw=document.getElementById('stats').offsetWidth||180;
  const cw=window.innerWidth-sw,ch=window.innerHeight,vw=video.videoWidth||640,vh=video.videoHeight||480;
  const s=Math.min(cw/vw,ch/vh);return{s,ox:(cw-vw*s)/2,oy:(ch-vh*s)/2};
}
function drawPose(pose,arm){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(!cvs.width||!video.videoWidth)return;
  const{s,ox,oy}=proj(),px=k=>({x:k.x*s+ox,y:k.y*s+oy});
  ctx.strokeStyle='rgba(168,85,247,.85)';ctx.lineWidth=3;
  for(const[a,b]of SKEL){
    const pa=pose.keypoints[a],pb=pose.keypoints[b];
    if(pa?.score>=CONF&&pb?.score>=CONF){const p1=px(pa),p2=px(pb);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}
  }
  for(const p of pose.keypoints){
    if(p.score>=CONF){const pp=px(p);ctx.beginPath();ctx.arc(pp.x,pp.y,5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='rgba(168,85,247,.9)';ctx.lineWidth=2;ctx.stroke();}
  }
  if(arm){
    const ep=px(arm.eN),sp=px(arm.sN),wp=px(arm.wN);
    const a1=Math.atan2(sp.y-ep.y,sp.x-ep.x),a2=Math.atan2(wp.y-ep.y,wp.x-ep.x);
    ctx.beginPath();ctx.arc(ep.x,ep.y,28,a1,a2,false);
    ctx.strokeStyle=arm.angle<90?'rgba(34,197,94,.9)':'rgba(168,85,247,.9)';ctx.lineWidth=3;ctx.stroke();
    const mid=(a1+a2)/2;ctx.fillStyle='#fff';ctx.font='bold 16px Arial';ctx.textAlign='center';
    ctx.shadowColor='#000';ctx.shadowBlur=6;
    ctx.fillText(Math.round(arm.angle)+'°',ep.x+Math.cos(mid)*44,ep.y+Math.sin(mid)*44);
    ctx.shadowBlur=0;ctx.textAlign='left';
  }
}

// ── Rep counter — pure angle logic, no NN gate ────────────────────────────────
// Thresholds: arms overhead ~150°+, bar pulled down ~50-80°
// BOT: angle must drop BELOW this to register the down phase
// TOP: angle must rise ABOVE this to complete the rep
const TOP = 130;
const BOT = 90;
const MIN_MS = 300;
const MAX_MS = 12000;

let phase='up', repStart=null, repMin=999, repMax=0;
let repCount=0, buf=[], frame=0;
const TARGET_REPS=10;
function updateProgress(){
  const pct=Math.min(100,repCount/TARGET_REPS*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-label').textContent=repCount+' rep'+(repCount===1?'':'s');
  if(repCount>=TARGET_REPS){
    document.getElementById('prog-bar').style.background='linear-gradient(90deg,#22c55e,#16a34a)';
  }
}

function processAngle(raw){
  if(raw==null)return;

  // Light smoothing — keep it responsive
  buf.push(raw);
  if(buf.length>5)buf.shift();
  const ea=buf.reduce((a,b)=>a+b,0)/buf.length;

  // Update angle display
  document.getElementById('aval').textContent=Math.round(ea)+'°';
  document.getElementById('abar').style.width=Math.min(100,ea/180*100)+'%';
  const armDeg=Math.min(80,Math.max(5,(180-ea)/2));
  document.getElementById('arm-l').style.transform='rotate(-'+armDeg+'deg)';
  document.getElementById('arm-r').style.transform='rotate('+armDeg+'deg)';
  document.getElementById('arm-l').style.background=ea<90?'#22c55e':'#6366f1';
  document.getElementById('arm-r').style.background=ea<90?'#22c55e':'#6366f1';

  // Update debug
  document.getElementById('dbg-phase').textContent=phase;
  if(repMax>0)document.getElementById('dbg-max').textContent=Math.round(repMax);
  if(repMin<999)document.getElementById('dbg-min').textContent=Math.round(repMin);

  // Update brain every 8 frames
  if(frame++%8===0){
    const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
    const std=Math.sqrt(buf.reduce((s,v)=>s+(v-avg)**2,0)/buf.length)||1;
    updateNN(repMin<999?repMin:80,Math.max(repMax-repMin,40),std,2.0,avg);
  }

  const ph=document.getElementById('phase');
  const rn=document.getElementById('rn');
  const rv=document.getElementById('rverdict');

  if(phase==='up'){
    // Waiting for the pull-down
    repMax=Math.max(repMax,ea);
    ph.textContent='↓ Pull bar down';ph.className='rel';
    if(ea<BOT){
      // Bar is pulled down — start tracking the rep
      phase='down';
      repMin=ea;
      repStart=Date.now();
      ph.textContent='↑ Release back up';ph.className='pull';
    }
  } else {
    // Bar is down — waiting for the return
    repMin=Math.min(repMin,ea);
    const dur=Date.now()-repStart;
    if(dur>MAX_MS){
      // Took too long — reset
      phase='up';repMax=ea;repMin=999;buf=[];return;
    }
    if(ea>TOP && dur>MIN_MS){
      // Rep complete!
      repCount++;
      rn.textContent=repCount;
      updateProgress();
      rv.style.color='#22c55e';rv.textContent='✅ Rep!';
      rn.classList.add('pop');setTimeout(()=>rn.classList.remove('pop'),400);
      document.getElementById('dot').className='live';
      document.getElementById('dtxt').textContent='Counting';document.getElementById('dtxt').className='live';
      firePulse('rgba(34,197,94,.8)');
      // Run NN for visual display
      const rom=Math.round(repMax-repMin);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      const std=Math.sqrt(buf.reduce((s,v)=>s+(v-avg)**2,0)/buf.length)||1;
      updateNN(repMin,rom,std,dur/1000,avg);
      // Reset for next rep
      phase='up';repMax=ea;repMin=999;
      ph.textContent='↓ Pull bar down';ph.className='rel';
    }
  }
}

function doReset(){
  repCount=0;phase='up';repMax=0;repMin=999;repStart=null;buf=[];frame=0;
  document.getElementById('rn').textContent='0';document.getElementById('rn').className='';
  document.getElementById('rverdict').textContent='';
  document.getElementById('phase').textContent='Point camera side-on';document.getElementById('phase').className='';
  document.getElementById('dot').className='';document.getElementById('dtxt').textContent='Detecting';document.getElementById('dtxt').className='';
  document.getElementById('aval').textContent='—';
  document.getElementById('dbg-phase').textContent='up';
  document.getElementById('dbg-max').textContent='—';
  document.getElementById('dbg-min').textContent='—';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('prog-bar').style.background='linear-gradient(90deg,#22c55e,#4ade80)';
  document.getElementById('prog-label').textContent='0 reps';
}

// ── Camera + loop ─────────────────────────────────────────────────────────────
let detector=null,stream=null,facing='environment';
async function startCam(f){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:false});}
  catch(e){stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});}
  video.srcObject=stream;await video.play();
}
function flipCam(){facing=facing==='environment'?'user':'environment';startCam(facing);}

async function loop(){
  if(video.readyState>=2&&detector){
    const poses=await detector.estimatePoses(video);
    if(poses.length){
      const arm=bestArm(poses[0]);
      drawPose(poses[0],arm);
      processAngle(arm?.angle??null);
    } else {
      ctx.clearRect(0,0,cvs.width,cvs.height);
      document.getElementById('aval').textContent='—';
    }
  }
  requestAnimationFrame(loop);
}

async function boot(){
  const msg=document.getElementById('boot-msg'),bar=document.getElementById('bbar');
  const err=document.getElementById('boot-err'),retry=document.getElementById('retry');
  err.style.display='none';retry.style.display='none';
  const step=(w,t)=>{bar.style.width=w+'%';msg.textContent=t;};
  try{
    step(10,'Starting camera…');
    await startCam(facing);
    step(35,'Loading AI…');
    // Use SINGLEPOSE_LIGHTNING — most reliable, fastest
    detector=await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
    );
    step(100,'Ready ✓');
    await new Promise(r=>setTimeout(r,300));
    document.getElementById('boot').style.display='none';
    document.getElementById('app').style.display='flex';
    await new Promise(r=>setTimeout(r,80));
    syncCvs();drawBrain();loop();
  }catch(e){
    err.style.display='block';
    err.innerHTML='❌ '+e.message+'<br/>Open in Chrome and allow camera.';
    retry.style.display='block';msg.textContent='';
  }
}
window.addEventListener('load',boot);
</script>
