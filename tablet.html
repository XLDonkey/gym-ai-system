<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>XLFitness AI — Stakeholder Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#07090f;color:#fff;font-family:'Segoe UI',Arial,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

    /* ── Boot ── */
    #boot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px;background:#07090f;}
    .boot-logo{font-size:2rem;font-weight:900;color:#00aaff;letter-spacing:6px;}
    .boot-sub{color:#334;font-size:.85rem;letter-spacing:2px;}
    #start-btn{padding:18px 56px;background:#00aaff;color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:900;cursor:pointer;letter-spacing:1px;}
    #boot-status{font-size:.8rem;color:#445;min-height:1.2em;letter-spacing:1px;}
    #boot-bar-wrap{width:280px;height:6px;background:#141e2e;border-radius:3px;overflow:hidden;display:none;}
    #boot-bar{height:100%;background:linear-gradient(90deg,#0055cc,#00aaff);width:0%;transition:width .4s;}
    #boot-err{color:#f44;font-size:.78rem;text-align:center;max-width:300px;display:none;}

    /* ── App layout — two panel ── */
    #app{display:none;flex:1;flex-direction:row;}

    /* Left: camera */
    #cam-panel{flex:1;position:relative;background:#000;overflow:hidden;}
    #video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
    #pose-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:2;}

    /* Overlaid rep counter on camera panel */
    #rep-overlay{position:absolute;bottom:24px;left:24px;z-index:5;}
    #rep-lbl{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);}
    #rep-n{font-size:8rem;font-weight:900;line-height:1;text-shadow:0 4px 40px rgba(0,0,0,.9);transition:color .15s,transform .15s;}
    #rep-n.fg{color:#0f0;transform:scale(1.08);}
    #rep-n.fp{color:#f90;transform:scale(1.05);}
    #rep-verdict{font-size:.9rem;font-weight:700;color:rgba(255,255,255,.5);margin-top:4px;min-height:1.2em;}

    /* Phase indicator */
    #phase-pill{position:absolute;bottom:24px;right:16px;z-index:5;padding:8px 20px;border-radius:20px;font-size:.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:rgba(0,0,0,.7);border:1px solid #333;color:#445;transition:all .25s;}
    #phase-pill.pulling{background:rgba(0,200,0,.18);border-color:#0f0;color:#0f0;}
    #phase-pill.releasing{background:rgba(0,120,255,.18);border-color:#0af;color:#0af;}

    /* Right: stats panel */
    #stats-panel{width:300px;background:#0b0f18;border-left:1px solid #141e2e;display:flex;flex-direction:column;padding:20px 16px;gap:16px;overflow-y:auto;}
    
    .brand{text-align:center;padding-bottom:12px;border-bottom:1px solid #141e2e;}
    .brand h1{font-size:1rem;font-weight:900;color:#00aaff;letter-spacing:4px;}
    .brand p{font-size:.62rem;color:#334;letter-spacing:1px;margin-top:2px;}

    /* Status */
    .status-row{display:flex;align-items:center;gap:8px;}
    #sdot{width:9px;height:9px;border-radius:50%;background:#1a2030;transition:all .3s;flex-shrink:0;}
    #sdot.active{background:#0f0;box-shadow:0 0 10px #0f0;animation:glow 1s infinite alternate;}
    #sdot.seated{background:#f90;box-shadow:0 0 8px #f90;}
    @keyframes glow{to{box-shadow:0 0 18px #0f0;}}
    #stxt{font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#334;}
    #stxt.active{color:#0f0;} #stxt.seated{color:#f90;}

    /* NN Brain */
    .section-label{font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:#1a2a3a;margin-bottom:8px;}
    #brain-cv{width:100%;height:120px;display:block;background:#050810;border-radius:8px;border:1px solid #0f141e;}
    
    .prob-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .prob-lbl{font-size:.65rem;color:#556;width:52px;flex-shrink:0;}
    .prob-track{flex:1;height:6px;background:#0f141e;border-radius:3px;overflow:hidden;}
    .prob-fill{height:100%;border-radius:3px;transition:width .25s;}
    .prob-val{font-size:.65rem;font-weight:800;width:30px;text-align:right;}

    #nn-verdict{text-align:center;font-size:.8rem;font-weight:900;padding:8px;border-radius:8px;border:1px solid #1a2a3a;color:#334;letter-spacing:1px;margin-top:4px;}

    /* Elbow angle gauge */
    .gauge-wrap{text-align:center;}
    #angle-val{font-size:2.2rem;font-weight:900;color:#00aaff;line-height:1;}
    #angle-sub{font-size:.6rem;color:#334;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
    #angle-bar-wrap{width:100%;height:6px;background:#0f141e;border-radius:3px;overflow:hidden;margin-top:8px;}
    #angle-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#0f0,#fa0,#f44);width:50%;}

    /* Controls */
    .btn-row{display:flex;gap:8px;margin-top:auto;}
    .cbtn{flex:1;padding:10px;border-radius:9px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid #1a2a3a;background:#0f141e;color:#445;}
    .cbtn:hover{border-color:#00aaff44;color:#00aaff;}
    #reset-btn{border-color:rgba(255,100,100,.3);color:#f44;}
  </style>
</head>

<!-- Boot -->
<div id="boot">
  <div class="boot-logo">XLFITNESS</div>
  <div class="boot-sub">AI REP COUNTER · STAKEHOLDER DEMO</div>
  <button id="start-btn" onclick="boot()">▶ START DEMO</button>

  </div>

  <!-- Right: stats -->
  <div id="stats-panel">
    <div class="brand">
      <h1>XLFITNESS AI</h1>
      <p>Nautilus Nitro · Lat Pulldown</p>
    </div>

    <div class="status-row">
      <div id="sdot"></div>
      <span id="stxt">Initialising…</span>
    </div>

    <!-- Angle gauge -->
    <div class="gauge-wrap">
      <div class="section-label">Elbow Angle</div>

      <div id="angle-sub">degrees</div>
      <div id="angle-bar-wrap"><div id="angle-bar" style="width:50%"></div></div>

      <div class="section-label">Neural Network</div>

        <div class="prob-row">
          <span class="prob-lbl">Bad Rep</span>
          <div class="prob-track"><div class="prob-fill" id="pb-bad" style="background:#f44;width:0%"></div></div>
          <span class="prob-val" id="pv-bad" style="color:#f44">0%</span>
        </div>
        <div class="prob-row">
          <span class="prob-lbl">False Move</span>
          <div class="prob-track"><div class="prob-fill" id="pb-false" style="background:#f90;width:0%"></div></div>
          <span class="prob-val" id="pv-false" style="color:#f90">0%</span>
        </div>
        <div id="nn-verdict">Waiting…</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="btn-row">
      <button class="cbtn" id="reset-btn">↺ Reset</button>
      <button class="cbtn" id="flip-btn">🔄 Flip</button>
    </div>
  </div>

</div>

<!-- Hidden canvas for pose -->
<canvas id="pose-canvas"></canvas>

1986919339197382,-0.03942720869324422,-0.24880523541897473,-0.685369174293107,-0.919507854310577,0.14619714128619496],[-0.18102311663426865,-0.5652201958768401,0.5118689821037379,-0.689201458278113,2.022024756768973,0.10212344211422081,-1.3374218781096028,0.02532074752539694,-0.21732633545924826,0.5610084384949602,-0.053751050714289955,-0.006614757452609679],[-0.8848418116850513,-0.20381670580524328,-0.012038067967352883,-0.6683585325315717,-0.5635756366540103,-0.21307263143895527,-0.7147391737413827,-1.5532997802162454,3.403586943199426,-0.697188989294392,1.512803765907451,-0.8778780580409755],[-1.2300548544601242,-0.2134379821553661,-0.16534082751521484,0.14845494143054888,-1.003976048398359,-0.4645302886260406,-1.6245263112836412,-0.3303548962400715,0.99335294815477,-0.0023112145337818185,1.3521959702650226,-0.04254471140904132],[-0.11022119203347,-3.386193098118284,1.2578678619681962,-1.109201063327187,-5.541761307336385,0.6961548728059379,-0.9602352345535559,-1.0850185715888458,0.4865053591370835,0.8013277535625423,-3.201697943555057,-0.8652711248307443],[-0.44711347738181256,0.2522164846142357,-0.020837454244849316,-0.01246397634079747,-0.3586144840314752,0.029341319373769086,0.8753842816108969,-0.8470789655346468,0.27739974278327706,-0.3551752601720058,-0.5635997542667498,-0.36587623439154127]],[[3.229261761942651,-0.39465155385968476,0.4376905859182338,0.38285688072517743,1.5125500155945246,2.1036511922151684,0.5317044427574403,0.9764201881203034],[-5.747842050046475,4.3372447047559,0.22977929615296436,0.24534449863054894,-4.196658298091416,-2.035220157283878,2.924317285738913,-0.02247549771868596],[3.2780023017514854,-5.2829992235938565,0.15923015152876585,0.15780022338200397,1.7460647680655303,1.305629291763246,-3.582697044926651,0.6169632567416055]]],"biases":[[-0.7983328423624827,-0.7459439746438443,-0.9830856928645555,-1.5434930611942956,-0.3987283638337163,-0.5840160412940504,0.701621509211516,0.704308695468621,0.3847751569251879,-2.237881009852468,-0.29155718814174697,-0.695193712545157],[-1.1623671867967063,1.6796765731043957,-0.9383270422154014,0.4886132218483841,0.33618036057780226,0.929999794029703,-0.2693988901207702,-0.5406464262695223],[0.10856555103036028,-1.955889126267632,0.9430447263238027]],"features":["min_angle","rom","std_angle","duration_s","avg_angle"],"trained_on":{"good_rep":55,"bad_rep":61,"false_movement":90,"total":206},"cv_accuracy":76.7};
function relu(x){return x.map(v=>Math.max(0,v));}
function softmax(x){const m=Math.max(...x),e=x.map(v=>Math.exp(v-m)),s=e.reduce((a,b)=>a+b,0);return e.map(v=>v/s);}
function mv(W,x){return W.map(r=>r.reduce((s,w,i)=>s+w*x[i],0));}
function nnRun(minA,rom,std,durS,avg){
  let h=([minA,rom,std,durS,avg]).map((v,i)=>(v-M.scaler_mean[i])/M.scaler_scale[i]);
  const acts=[h.map(v=>Math.min(1,Math.max(0,(v+2)/4)))];
  for(let i=0;i<M.weights.length;i++){
    const next=mv(M.weights[i],h).map((v,j)=>v+M.biases[i][j]);
    if(i<M.weights.length-1){h=relu(next);const mx=Math.max(...h.map(Math.abs))||1;acts.push(h.map(v=>Math.min(1,Math.max(0,v/mx))));}
    else{h=softmax(next);acts.push(h);}
  }
  return{acts,probs:h};
}

// ── Brain canvas ──────────────────────────────────────────────────────────────
const LAYERS=[5,12,8,3];
let bActs=LAYERS.map(n=>new Array(n).fill(0));
let pulses=[];
const bCv=document.getElementById('brain-cv');
const bCtx=bCv.getContext('2d');
function nPos(l,n,cw,ch){const x=(l+0.5)/LAYERS.length*cw,c=LAYERS[l],g=Math.min(ch/(c+1),13);return{x,y:(ch-(c-1)*g)/2+n*g};}
function drawBrain(){
  const cw=bCv.width||268,ch=bCv.height||120;
  bCtx.fillStyle='#050810';bCtx.fillRect(0,0,cw,ch);
  for(let l=0;l<LAYERS.length-1;l++)for(let i=0;i<LAYERS[l];i++)for(let j=0;j<LAYERS[l+1];j++){
    const p1=nPos(l,i,cw,ch),p2=nPos(l+1,j,cw,ch),act=(bActs[l][i]+bActs[l+1][j])/2;
    const w=M.weights[l][j]?M.weights[l][j][i]||0:0;
    bCtx.strokeStyle=w>=0?`rgba(0,170,255,${.04+act*.35})`:`rgba(255,60,60,${.04+act*.35})`;
    bCtx.lineWidth=.4+act*1.2;bCtx.beginPath();bCtx.moveTo(p1.x,p1.y);bCtx.lineTo(p2.x,p2.y);bCtx.stroke();
  }
  pulses=pulses.filter(p=>p.t<1);
  pulses.forEach(p=>{p.t+=.05;const x=p.x1+(p.x2-p.x1)*p.t,y=p.y1+(p.y2-p.y1)*p.t;bCtx.beginPath();bCtx.arc(x,y,2.5,0,Math.PI*2);bCtx.fillStyle=p.c;bCtx.fill();});
  for(let l=0;l<LAYERS.length;l++)for(let n=0;n<LAYERS[l];n++){
    const pos=nPos(l,n,cw,ch),act=bActs[l]?bActs[l][n]:0;
    const nc=l===LAYERS.length-1?(n===2?`rgba(0,255,0,${.3+act*.7})`:n===0?`rgba(255,60,60,${.3+act*.7})`:`rgba(255,150,0,${.3+act*.7})`):`rgba(${Math.floor(act*255)},${Math.floor(act*160+80)},255,${.4+act*.5})`;
    if(act>.5){bCtx.shadowColor=nc;bCtx.shadowBlur=8;}
    bCtx.beginPath();bCtx.arc(pos.x,pos.y,3+act*2.5,0,Math.PI*2);bCtx.fillStyle=nc;bCtx.fill();bCtx.shadowBlur=0;
    if(l===0){bCtx.fillStyle='rgba(80,130,180,.6)';bCtx.font='5.5px Arial';bCtx.textAlign='right';bCtx.fillText(['min°','ROM','std','dur','avg'][n],pos.x-5,pos.y+2);}
    if(l===LAYERS.length-1){bCtx.fillStyle=['#f44','#f90','#0f0'][n];bCtx.font='bold 6px Arial';bCtx.textAlign='left';bCtx.fillText(['BAD','FALSE','GOOD'][n],pos.x+5,pos.y+2);}
  }
  bCtx.textAlign='left';
}
(function ab(){drawBrain();requestAnimationFrame(ab);})();
function firePulse(c){for(let l=0;l<LAYERS.length-1;l++)for(let i=0;i<LAYERS[l];i++)for(let j=0;j<LAYERS[l+1];j++)if(Math.random()<.18){const p1=nPos(l,i,bCv.width,bCv.height),p2=nPos(l+1,j,bCv.width,bCv.height);pulses.push({x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,t:0,c});}}
function resizeBrain(){bCv.width=bCv.clientWidth||268;bCv.height=120;}

function updateBrain(minA,rom,std,durS,avg){
  try{
    const{acts,probs}=nnRun(minA,rom,std,durS,avg);
    bActs=acts;
    const[pb,pf,pg]=[probs[0],probs[1],probs[2]];
    document.getElementById('pb-good').style.width=Math.round(pg*100)+'%';
    document.getElementById('pb-bad').style.width=Math.round(pb*100)+'%';
    document.getElementById('pb-false').style.width=Math.round(pf*100)+'%';
    document.getElementById('pv-good').textContent=Math.round(pg*100)+'%';
    document.getElementById('pv-bad').textContent=Math.round(pb*100)+'%';
    document.getElementById('pv-false').textContent=Math.round(pf*100)+'%';
    const best=pg>pb&&pg>pf?'good':pb>pf?'bad':'false';
    const v=document.getElementById('nn-verdict');
    if(best==='good'){v.textContent='✅ GOOD REP';v.style.cssText='border-color:#0f0;color:#0f0;background:rgba(0,255,0,.06);';}
    else if(best==='bad'){v.textContent='⚠ BAD FORM';v.style.cssText='border-color:#f44;color:#f44;background:rgba(255,60,60,.06);';}
    else{v.textContent='⚡ FALSE MOVE';v.style.cssText='border-color:#f90;color:#f90;background:rgba(255,150,0,.06);';}
    return best;
  }catch(e){return'good';}
}

// ── Pose ──────────────────────────────────────────────────────────────────────
const SKEL=[[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
const CONF=0.2;
const KP_COLORS=['#ff6','#ff6','#ff6','#ff6','#ff6','#0f0','#0af','#0f0','#0af','#0f0','#0af','#fa0','#fa0','#fa0','#fa0','#fa0','#fa0'];

function gkp(pose,i){const p=pose.keypoints[i];return p&&p.score>=CONF?p:null;}
function calcAngle(a,b,c){
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const d=ab.x*cb.x+ab.y*cb.y,m=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return m>0?Math.acos(Math.min(1,Math.max(-1,d/m)))*180/Math.PI:null;
}
function getBestArm(pose){
  const arms=[];
  for(const[si,ei,wi]of[[5,7,9],[6,8,10]]){
    const s=gkp(pose,si),e=gkp(pose,ei),w=gkp(pose,wi);
    if(s&&e&&w){const a=calcAngle(s,e,w);if(a!==null)arms.push({angle:a,conf:(s.score+e.score+w.score)/3,wN:{x:w.x,y:w.y},sN:{x:s.x,y:s.y},eN:{x:e.x,y:e.y}});}
  }
  if(!arms.length)return null;
  arms.sort((a,b)=>b.conf-a.conf);
  return arms[0];
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const video=document.getElementById('video');
const pCv=document.getElementById('pose-canvas');
const pCtx=pCv.getContext('2d');

function syncCanvas(){pCv.width=window.innerWidth;pCv.height=window.innerHeight;}
window.addEventListener('resize',()=>{syncCanvas();resizeBrain();});
window.addEventListener('orientationchange',()=>setTimeout(()=>{syncCanvas();resizeBrain();},300));

function getTransform(){
  // Camera panel is left side — width = total - 300px stats panel
  const cw=window.innerWidth-300,ch=window.innerHeight;
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  const scale=Math.min(cw/vw,ch/vh);
  return{cw,ch,scale,ox:(cw-vw*scale)/2,oy:(ch-vh*scale)/2};
}

function drawPose(pose,arm){
  pCtx.clearRect(0,0,pCv.width,pCv.height);
  if(!pCv.width||!video.videoWidth)return;
  const{scale:sc,ox,oy}=getTransform();
  const px=kp=>({x:kp.x*sc+ox,y:kp.y*sc+oy});

  // Skeleton
  pCtx.strokeStyle='rgba(0,255,120,.85)';pCtx.lineWidth=3;
  for(const[a,b]of SKEL){
    const pa=pose.keypoints[a],pb=pose.keypoints[b];
    if(pa?.score>=CONF&&pb?.score>=CONF){
      const p1=px(pa),p2=px(pb);
      pCtx.beginPath();pCtx.moveTo(p1.x,p1.y);pCtx.lineTo(p2.x,p2.y);pCtx.stroke();
    }
  }
  // Joints
  for(let i=0;i<pose.keypoints.length;i++){
    const kp=pose.keypoints[i];
    if(kp.score>=CONF){
      const p=px(kp);
      pCtx.beginPath();pCtx.arc(p.x,p.y,6,0,Math.PI*2);
      pCtx.fillStyle=KP_COLORS[i]||'#fff';pCtx.fill();
      pCtx.strokeStyle='rgba(0,0,0,.6)';pCtx.lineWidth=1.5;pCtx.stroke();
    }
  }
  // Angle arc + label at elbow
  if(arm){
    const ep={x:arm.eN.x*sc+ox,y:arm.eN.y*sc+oy};
    const sp={x:arm.sN.x*sc+ox,y:arm.sN.y*sc+oy};
    const wp={x:arm.wN.x*sc+ox,y:arm.wN.y*sc+oy};
    const a1=Math.atan2(sp.y-ep.y,sp.x-ep.x);
    const a2=Math.atan2(wp.y-ep.y,wp.x-ep.x);
    pCtx.beginPath();pCtx.arc(ep.x,ep.y,30,a1,a2,false);
    pCtx.strokeStyle=arm.angle<90?'rgba(0,255,100,.9)':'rgba(0,170,255,.7)';
    pCtx.lineWidth=3;pCtx.stroke();
    pCtx.fillStyle='#fff';pCtx.font='bold 16px Arial';pCtx.textAlign='center';
    const midA=(a1+a2)/2;
    pCtx.shadowColor='rgba(0,0,0,.9)';pCtx.shadowBlur=5;
    pCtx.fillText(Math.round(arm.angle)+'°',ep.x+Math.cos(midA)*48,ep.y+Math.sin(midA)*48);
    pCtx.shadowBlur=0;pCtx.textAlign='left';
  }
}

// ── EMA ───────────────────────────────────────────────────────────────────────
function makeEMA(a){let v=null;return{update(x){if(x===null)return v;v=v===null?x:a*x+(1-a)*v;return v;},reset(){v=null;}};}

// ── Rep detection ─────────────────────────────────────────────────────────────
const TOP=125,BOT=95,MIN_MS=400,MAX_MS=15000;
const ema=makeEMA(0.3);
let phase='up',repStart=null,repMin=999,repMax=0,repBuf=[],repCount=0,lastArm=null,frameN=0;

const repNEl=document.getElementById('rep-n');
const repVerdictEl=document.getElementById('rep-verdict');
const phasePill=document.getElementById('phase-pill');
const sdot=document.getElementById('sdot');
const stxt=document.getElementById('stxt');

function setState(s){sdot.className=s;stxt.className=s;stxt.textContent=s==='active'?'Counting Reps':s==='seated'?'Person Detected':'Ready';}

function processAngle(raw){
  if(raw===null)return;
  const ea=ema.update(raw);if(ea===null)return;
  repBuf.push(ea);if(repBuf.length>300)repBuf.shift();

  // Angle gauge
  document.getElementById('angle-val').textContent=Math.round(ea)+'°';
  document.getElementById('angle-bar').style.width=Math.min(100,Math.max(0,ea/180*100))+'%';

  if(phase==='up'){
    repMax=Math.max(repMax,ea);
    phasePill.textContent='↓ Pull bar down';phasePill.className='releasing';
    if(ea<BOT){
      let wristOk=true;
      if(lastArm){wristOk=lastArm.wN.y<lastArm.sN.y+0.20;}
      if(wristOk){phase='down';repMin=ea;repStart=Date.now();phasePill.textContent='↑ Release up';phasePill.className='pulling';}
    }
  }else{
    repMin=Math.min(repMin,ea);
    const dur=repStart?Date.now()-repStart:0;
    if(dur>MAX_MS){phase='up';repMax=ea;repMin=999;ema.reset();return;}
    if(ea>TOP&&dur>=MIN_MS){
      const rom=Math.round(repMax-repMin);
      const sl=repBuf.slice(-Math.max(10,Math.round(dur/33)));
      const avg=sl.reduce((a,b)=>a+b,0)/sl.length;
      const std=Math.sqrt(sl.reduce((s,v)=>s+(v-avg)**2,0)/sl.length);
      const nn=updateBrain(repMin,rom,std,dur/1000,avg);
      if(nn==='false'){
        repVerdictEl.textContent='⚡ False movement — not counted';
        phase='up';repMax=ea;repMin=999;phasePill.textContent='↓ Pull bar down';phasePill.className='releasing';
        return;
      }
      const isGood=nn==='good'&&rom>=40&&repMin<BOT+10;
      repCount++;repNEl.textContent=repCount;
      repVerdictEl.textContent=isGood?'✅ Great rep!':'Rep counted';
      repNEl.className=isGood?'fg':'fp';
      setTimeout(()=>repNEl.className='',500);
      firePulse(isGood?'#0f0':'#fa0');
      setState('active');
      phase='up';repMax=ea;repMin=999;phasePill.textContent='↓ Pull bar down';phasePill.className='releasing';
    }
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let detector=null;
async function loop(){
  if(video.readyState>=2&&detector){
    const poses=await detector.estimatePoses(video);
    if(poses.length>0){
      const pose=poses[0];
      const arm=getBestArm(pose);
      if(arm)lastArm=arm;
      drawPose(pose,arm);
      processAngle(arm?arm.angle:null);
      if(frameN++%10===0&&repBuf.length>=5){
        const sl=repBuf.slice(-50),avg=sl.reduce((a,b)=>a+b,0)/sl.length;
        const std=Math.sqrt(sl.reduce((s,v)=>s+(v-avg)**2,0)/sl.length);
        updateBrain(repMin<900?repMin:80,Math.max(repMax-repMin,40),std,2.5,avg);
      }
      if(sdot.className===''){setState('seated');}
    }else{
      pCtx.clearRect(0,0,pCv.width,pCv.height);
      ema.reset();
      document.getElementById('angle-val').textContent='—';
    }
  }
  requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click',()=>{
  repCount=0;phase='up';repMax=0;repMin=999;repStart=null;repBuf=[];ema.reset();
  repNEl.textContent='0';repNEl.className='';
  repVerdictEl.textContent='Counting automatically…';
  phasePill.textContent='Ready';phasePill.className='';
  setState('');
});

let stream=null,facing='user';
async function startCam(f){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:false});}
  catch(e){stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});}
  video.srcObject=stream;await video.play();
}
document.getElementById('flip-btn').addEventListener('click',async()=>{
  facing=facing==='user'?'environment':'user';await startCam(facing);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot(){
  const btn=document.getElementById('start-btn');
  const status=document.getElementById('boot-status');
  const barWrap=document.getElementById('boot-bar-wrap');
  const bar=document.getElementById('boot-bar');
  const errEl=document.getElementById('boot-err');
  btn.style.display='none';barWrap.style.display='block';
  const prog=(p,t)=>{bar.style.width=p+'%';status.textContent=t;};
  try{
    prog(5,'Starting camera…');
    await startCam(facing);
    prog(30,'Camera ready ✓');
    prog(35,'Loading AI model… (~15–20s on tablet)');
    detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING});
    prog(95,'AI ready ✓');resizeBrain();syncCanvas();
    await new Promise(r=>setTimeout(r,300));
    prog(100,'Go!');
    await new Promise(r=>setTimeout(r,300));
    document.getElementById('boot').style.display='none';
    document.getElementById('app').style.display='flex';
    syncCanvas();resizeBrain();
    setState('');
    loop();
  }catch(e){
    btn.style.display='block';barWrap.style.display='none';
    errEl.style.display='block';errEl.textContent='❌ '+e.message+' — use Chrome & allow camera';
  }
}
</script>
