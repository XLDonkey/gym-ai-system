<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XL Fitness — Weight Plate Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --xl-purple: #7B2FBE; --xl-purple-dark: #5a1f8a;
      --xl-purple-light: #9d4fe0; --bg: #0d0d0d;
      --card: #1a1a2e; --text: #f0f0f0; --muted: #888;
    }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
    header { width:100%; background:linear-gradient(135deg,var(--xl-purple-dark),var(--xl-purple)); padding:14px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 20px rgba(123,47,190,0.5); }
    header .logo { font-size:1.4rem; font-weight:800; letter-spacing:-0.5px; }
    header .logo span { color:#d4a8ff; }
    header .subtitle { font-size:0.75rem; color:#d4a8ff; font-weight:400; }
    .container { width:100%; max-width:600px; padding:16px; display:flex; flex-direction:column; gap:14px; }
    .camera-wrapper { position:relative; width:100%; border-radius:16px; overflow:hidden; background:#000; box-shadow:0 4px 30px rgba(123,47,190,0.3); border:2px solid var(--xl-purple); }
    #videoEl { width:100%; display:block; }
    #overlayCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    .status-badge { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.65); border:1px solid var(--xl-purple-light); border-radius:20px; padding:4px 12px; font-size:0.7rem; color:#d4a8ff; backdrop-filter:blur(6px); }
    .status-badge.live::before { content:''; display:inline-block; width:7px; height:7px; background:#4ade80; border-radius:50%; margin-right:6px; animation:pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #startOverlay { position:absolute; inset:0; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; cursor:pointer; transition:opacity 0.3s; }
    #startOverlay.hidden { opacity:0; pointer-events:none; }
    #startOverlay .start-icon { width:60px; height:60px; background:var(--xl-purple); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; }
    #startOverlay p { font-size:0.85rem; color:#ccc; }
    .weight-display { background:var(--card); border-radius:16px; padding:20px 24px; text-align:center; border:1px solid rgba(123,47,190,0.4); box-shadow:0 4px 20px rgba(0,0,0,0.4); position:relative; overflow:hidden; }
    .weight-display.locked::after { content:'LOCKED'; position:absolute; top:10px; right:14px; font-size:0.6rem; letter-spacing:2px; color:#4ade80; font-weight:700; }
    .weight-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:6px; }
    .weight-value { font-size:4rem; font-weight:900; line-height:1; background:linear-gradient(135deg,#d4a8ff,var(--xl-purple-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; transition:all 0.4s ease; }
    .weight-unit { font-size:1.2rem; color:var(--muted); margin-top:2px; }
    .confidence-bar { margin-top:10px; height:4px; background:#222; border-radius:2px; overflow:hidden; }
    .confidence-fill { height:100%; background:linear-gradient(90deg,var(--xl-purple),#4ade80); border-radius:2px; transition:width 0.3s ease; }
    .breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .plate-card { background:var(--card); border-radius:12px; padding:14px 10px; text-align:center; border:2px solid transparent; transition:all 0.3s ease; }
    .plate-card.active { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.4); }
    .plate-card.white  { border-color:rgba(255,255,255,0.25); }
    .plate-card.yellow { border-color:rgba(234,179,8,0.4); }
    .plate-card.blue   { border-color:rgba(59,130,246,0.5); }
    .plate-card.white.active  { border-color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.07); }
    .plate-card.yellow.active { border-color:rgba(234,179,8,0.9);   background:rgba(234,179,8,0.08); }
    .plate-card.blue.active   { border-color:rgba(59,130,246,0.9);  background:rgba(59,130,246,0.1); }
    .plate-dot { width:28px; height:28px; border-radius:50%; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:700; }
    .plate-dot.white  { background:#e8e8e8; color:#333; border:2px solid #aaa; }
    .plate-dot.yellow { background:#eab308; color:#333; }
    .plate-dot.blue   { background:#3b82f6; color:#fff; }
    .plate-count { font-size:2rem; font-weight:800; line-height:1; transition:all 0.3s; }
    .plate-card.white  .plate-count { color:#e8e8e8; }
    .plate-card.yellow .plate-count { color:#eab308; }
    .plate-card.blue   .plate-count { color:#60a5fa; }
    .plate-name { font-size:0.65rem; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:1px; }
    .plate-weight { font-size:0.7rem; margin-top:2px; }
    .plate-card.white  .plate-weight { color:rgba(232,232,232,0.6); }
    .plate-card.yellow .plate-weight { color:rgba(234,179,8,0.7); }
    .plate-card.blue   .plate-weight { color:rgba(96,165,250,0.7); }
    .debug-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--card); border-radius:10px; border:1px solid rgba(255,255,255,0.06); }
    .debug-row label { font-size:0.78rem; color:var(--muted); cursor:pointer; }
    .toggle { position:relative; width:40px; height:22px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:#333; border-radius:22px; cursor:pointer; transition:0.3s; }
    .toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:white; border-radius:50%; transition:0.3s; }
    .toggle input:checked + .toggle-slider { background:var(--xl-purple); }
    .toggle input:checked + .toggle-slider:before { transform:translateX(18px); }
    .cam-btn { background:rgba(123,47,190,0.2); border:1px solid var(--xl-purple); color:var(--xl-purple-light); border-radius:8px; padding:8px 16px; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .cam-btn:hover { background:rgba(123,47,190,0.4); }
    footer { padding:16px; font-size:0.65rem; color:#444; text-align:center; }
  </style>
</head>
<body>
<header>
  <div>
    <div class="logo">XL <span>Fitness</span></div>
    <div class="subtitle">Weight Plate Detector — Demo v0.3</div>
  </div>
</header>
<div class="container">
  <div class="camera-wrapper">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="status-badge" id="statusBadge">Tap to start</div>
    <div id="startOverlay">
      <div class="start-icon">📷</div>
      <p>Tap to start camera</p>
    </div>
  </div>
  <div class="weight-display" id="weightDisplay">
    <div class="weight-label">Total Weight Detected</div>
    <div class="weight-value" id="totalWeight">0</div>
    <div class="weight-unit">kg</div>
    <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill" style="width:0%"></div></div>
  </div>
  <div class="breakdown">
    <div class="plate-card white" id="card-white">
      <div class="plate-dot white">5</div>
      <div class="plate-count" id="count-white">0</div>
      <div class="plate-name">White</div>
      <div class="plate-weight">5 kg each</div>
    </div>
    <div class="plate-card yellow" id="card-yellow">
      <div class="plate-dot yellow">10</div>
      <div class="plate-count" id="count-yellow">0</div>
      <div class="plate-name">Yellow</div>
      <div class="plate-weight">10 kg each</div>
    </div>
    <div class="plate-card blue" id="card-blue">
      <div class="plate-dot blue">20</div>
      <div class="plate-count" id="count-blue">0</div>
      <div class="plate-name">Blue</div>
      <div class="plate-weight">20 kg each</div>
    </div>
  </div>
  <div class="debug-row">
    <label for="debugToggle">Show colour mask overlay</label>
    <label class="toggle"><input type="checkbox" id="debugToggle" /><span class="toggle-slider"></span></label>
  </div>
  <div class="debug-row">
    <label>Camera facing</label>
    <button class="cam-btn" id="flipBtn">🔄 Flip Camera</button>
  </div>
</div>
<footer>XL Fitness AI System · Weight Plate CV Demo v0.3</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  XL Fitness — Weight Plate Colour Detector v0.3
//  Key improvements over v0.2:
//  - Majority-vote smoothing over 15 frames (was 5)
//  - Lock-in logic: display only updates when 75%+ of frames agree
//  - Hysteresis: locked value holds until a new value is stable for 10+ frames
//  - Confidence bar shows how stable the current reading is
// ─────────────────────────────────────────────────────────────────────────────

const video       = document.getElementById('videoEl');
const canvas      = document.getElementById('overlayCanvas');
const ctx         = canvas.getContext('2d');
const startOvl    = document.getElementById('startOverlay');
const statusBadge = document.getElementById('statusBadge');
const debugToggle = document.getElementById('debugToggle');
const flipBtn     = document.getElementById('flipBtn');
const weightDisp  = document.getElementById('weightDisplay');
const confFill    = document.getElementById('confidenceFill');

const PROC_W = 320, PROC_H = 240;
const procCanvas = document.createElement('canvas');
procCanvas.width = PROC_W; procCanvas.height = PROC_H;
const procCtx = procCanvas.getContext('2d');

// ── RGB → HSV ──
function rgbToHsv(r, g, b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0, s=max===0?0:d/max, v=max;
  if(d!==0){switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return [h*360, s*100, v*100];
}

function classifyPixel(r, g, b) {
  const [h, s, v] = rgbToHsv(r, g, b);
  if (h>=210 && h<=240 && s>=40 && v>=40) return 'blue';
  if (h>=55  && h<=165 && s>=40 && v>=30) return 'yellow';
  if (s<=15  && v>=78)                    return 'white';
  return null;
}

function buildMasks(data) {
  const masks = {
    blue:   new Uint8Array(PROC_W*PROC_H),
    yellow: new Uint8Array(PROC_W*PROC_H),
    white:  new Uint8Array(PROC_W*PROC_H),
  };
  for (let i=0; i<PROC_W*PROC_H; i++) {
    const cls = classifyPixel(data[i*4], data[i*4+1], data[i*4+2]);
    if (cls) masks[cls][i] = 1;
  }
  return masks;
}

function countBands(mask, opts) {
  const {minRowFill=0.08, minGapRows=4, maxBandHFrac=0.12,
         minBandHFrac=0.015, minCentreFill=0.03,
         floorCutoff=0.72, topCutoff=0.05} = opts;

  const cx1=Math.floor(PROC_W*0.25), cx2=Math.floor(PROC_W*0.75);
  const ex1=Math.floor(PROC_W*0.20), ex2=Math.floor(PROC_W*0.80);

  const rowFills=new Float32Array(PROC_H), centreFills=new Float32Array(PROC_H);
  for (let y=0; y<PROC_H; y++) {
    let se=0, sc=0;
    for (let x=ex1; x<ex2; x++) se+=mask[y*PROC_W+x];
    for (let x=cx1; x<cx2; x++) sc+=mask[y*PROC_W+x];
    rowFills[y]=se/(ex2-ex1); centreFills[y]=sc/(cx2-cx1);
  }

  const rawBands=[];
  let inBand=false, bandStart=0, gapCount=0;
  for (let y=0; y<PROC_H; y++) {
    if (rowFills[y]>=minRowFill) {
      if (!inBand){inBand=true; bandStart=y;} gapCount=0;
    } else if (inBand) {
      if (++gapCount>=minGapRows){rawBands.push([bandStart,y-gapCount]); inBand=false; gapCount=0;}
    }
  }
  if (inBand) rawBands.push([bandStart, PROC_H-1]);

  const maxH=maxBandHFrac*PROC_H, minH=minBandHFrac*PROC_H;
  const floorY=floorCutoff*PROC_H, topY=topCutoff*PROC_H;
  const bands=[];
  for (const [y1,y2] of rawBands) {
    const bh=y2-y1;
    if (bh<minH||bh>maxH) continue;
    const cy=(y1+y2)/2;
    if (cy>floorY||cy<topY) continue;
    let sc=0; for(let y=y1;y<=y2;y++) sc+=centreFills[y];
    if (sc/Math.max(bh,1)<minCentreFill) continue;
    bands.push([y1,y2]);
  }
  return bands;
}

function getBandBox(mask, y1, y2) {
  let xMin=PROC_W, xMax=0;
  for (let y=y1; y<=y2; y++)
    for (let x=0; x<PROC_W; x++)
      if (mask[y*PROC_W+x]){if(x<xMin)xMin=x; if(x>xMax)xMax=x;}
  return xMin<=xMax ? [xMin,y1,xMax-xMin,y2-y1] : null;
}

// ─────────────────────────────────────────────────────────────────────────────
//  STABILISATION ENGINE
//  - Raw counts are pushed into a rolling window of WINDOW_SIZE frames
//  - The "stable count" is the MODE (most frequent value) in the window
//  - The display only updates when the mode appears in >= LOCK_THRESHOLD% of frames
//  - Once locked, the value holds until a NEW value achieves the same threshold
// ─────────────────────────────────────────────────────────────────────────────
const WINDOW_SIZE    = 15;   // frames to look back
const LOCK_THRESHOLD = 0.70; // 70% agreement needed to update display

const rawHistory = { white:[], yellow:[], blue:[] };
const lockedCounts = { white:0, yellow:0, blue:0 };

function getMode(arr) {
  const freq = {};
  let maxCount=0, mode=0;
  for (const v of arr) {
    freq[v]=(freq[v]||0)+1;
    if(freq[v]>maxCount){maxCount=freq[v]; mode=v;}
  }
  return {mode, confidence: maxCount/arr.length};
}

function stabilise(colour, rawCount) {
  const hist = rawHistory[colour];
  hist.push(rawCount);
  if (hist.length > WINDOW_SIZE) hist.shift();

  const {mode, confidence} = getMode(hist);

  // Only update the locked value if confidence exceeds threshold
  if (confidence >= LOCK_THRESHOLD) {
    lockedCounts[colour] = mode;
  }
  return {locked: lockedCounts[colour], confidence};
}

const OPTS = {
  blue:   {minRowFill:0.10,minGapRows:4,maxBandHFrac:0.10,minBandHFrac:0.015,minCentreFill:0.10,floorCutoff:0.72,topCutoff:0.05},
  yellow: {minRowFill:0.05,minGapRows:3,maxBandHFrac:0.10,minBandHFrac:0.015,minCentreFill:0.04,floorCutoff:0.72,topCutoff:0.05},
  white:  {minRowFill:0.04,minGapRows:5,maxBandHFrac:0.12,minBandHFrac:0.015,minCentreFill:0.03,floorCutoff:0.72,topCutoff:0.05},
};

const PLATE_STYLES = {
  blue:   {stroke:'#3b82f6', fill:'rgba(59,130,246,0.18)',  label:'Blue 20kg',   weight:20},
  yellow: {stroke:'#eab308', fill:'rgba(234,179,8,0.18)',   label:'Yellow 10kg', weight:10},
  white:  {stroke:'#e8e8e8', fill:'rgba(232,232,232,0.14)', label:'White 5kg',   weight:5},
};

let facingMode='environment', stream=null, running=false, rafId=null;

// Throttle detection to every 3rd frame for smoother rendering
let frameCount = 0;
let lastBandResults = {blue:[], yellow:[], white:[]};
let lastConfidence = 0;

function detectFrame() {
  if (!running) return;
  frameCount++;

  // Only run detection every 3rd frame — draw overlay every frame
  if (frameCount % 3 === 0) {
    procCtx.drawImage(video, 0, 0, PROC_W, PROC_H);
    const frame = procCtx.getImageData(0, 0, PROC_W, PROC_H);
    const masks = buildMasks(frame.data);

    // Clip white mask
    const floorRow=Math.floor(0.72*PROC_H), topRow=Math.floor(0.05*PROC_H);
    for (let y=0; y<PROC_H; y++)
      if (y>=floorRow||y<topRow)
        for (let x=0; x<PROC_W; x++) masks.white[y*PROC_W+x]=0;

    // Detect raw bands
    const bandResults={};
    for (const c of ['blue','yellow','white'])
      bandResults[c] = countBands(masks[c], OPTS[c]);

    lastBandResults = bandResults;

    // Stabilise each colour
    let minConf = 1;
    const stableCounts = {};
    for (const c of ['blue','yellow','white']) {
      const {locked, confidence} = stabilise(c, bandResults[c].length);
      stableCounts[c] = locked;
      if (confidence < minConf) minConf = confidence;
    }
    lastConfidence = minConf;

    const total = stableCounts.white*5 + stableCounts.yellow*10 + stableCounts.blue*20;

    // Update UI
    document.getElementById('totalWeight').textContent = total;
    for (const c of ['white','yellow','blue']) {
      document.getElementById(`count-${c}`).textContent = stableCounts[c];
      document.getElementById(`card-${c}`).classList.toggle('active', stableCounts[c]>0);
    }

    // Confidence bar & locked indicator
    const confPct = Math.round(minConf * 100);
    confFill.style.width = confPct + '%';
    weightDisp.classList.toggle('locked', minConf >= LOCK_THRESHOLD);

    // Draw overlay
    const dw=video.videoWidth||video.offsetWidth||PROC_W;
    const dh=video.videoHeight||video.offsetHeight||PROC_H;
    canvas.width=dw; canvas.height=dh;
    ctx.clearRect(0,0,dw,dh);
    const sx=dw/PROC_W, sy=dh/PROC_H;

    if (debugToggle.checked) {
      const od=ctx.createImageData(dw,dh);
      const cm={blue:[59,130,246],yellow:[234,179,8],white:[220,220,220]};
      for (let y=0;y<dh;y++) for (let x=0;x<dw;x++) {
        const px=Math.floor(x/sx), py=Math.floor(y/sy), idx=py*PROC_W+px;
        let col=null;
        if(masks.blue[idx])        col=cm.blue;
        else if(masks.yellow[idx]) col=cm.yellow;
        else if(masks.white[idx])  col=cm.white;
        if(col){const oi=(y*dw+x)*4; od.data[oi]=col[0]; od.data[oi+1]=col[1]; od.data[oi+2]=col[2]; od.data[oi+3]=110;}
      }
      ctx.putImageData(od,0,0);
    }

    ctx.font='bold 14px system-ui';
    for (const colour of ['blue','yellow','white']) {
      const style=PLATE_STYLES[colour];
      for (const [y1,y2] of bandResults[colour]) {
        const box=getBandBox(masks[colour],y1,y2);
        if (!box) continue;
        const [bx,by,bw,bh]=box;
        const rx=bx*sx, ry=by*sy, rw=bw*sx, rh=bh*sy;
        ctx.fillStyle=style.fill; ctx.fillRect(rx,ry,rw,rh);
        ctx.strokeStyle=style.stroke; ctx.lineWidth=3; ctx.strokeRect(rx,ry,rw,rh);
        const tw=ctx.measureText(style.label).width;
        const lx=rx, ly=Math.max(0,ry-26);
        ctx.fillStyle=style.stroke;
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(lx,ly,tw+16,22,4); else ctx.rect(lx,ly,tw+16,22);
        ctx.fill();
        ctx.fillStyle=colour==='white'?'#111':'#fff';
        ctx.fillText(style.label, lx+8, ly+15);
      }
    }

    if (total>0) {
      const txt=`${total} kg`;
      ctx.font='bold 22px system-ui';
      const tw=ctx.measureText(txt).width;
      ctx.fillStyle='rgba(20,5,40,0.75)';
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(8,8,tw+24,36,8); else ctx.rect(8,8,tw+24,36);
      ctx.fill();
      ctx.fillStyle='#d4a8ff';
      ctx.fillText(txt,20,32);
    }
  }

  rafId=requestAnimationFrame(detectFrame);
}

async function startCamera() {
  try {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode, width:{ideal:1280}, height:{ideal:720}}, audio:false
    });
    video.srcObject=stream;
    await video.play();
    running=true;
    startOvl.classList.add('hidden');
    statusBadge.textContent='LIVE';
    statusBadge.className='status-badge live';
    detectFrame();
  } catch(err) {
    statusBadge.textContent='Camera error';
    alert('Camera access denied. Please allow camera permissions and reload.');
  }
}

startOvl.addEventListener('click', startCamera);
flipBtn.addEventListener('click', ()=>{
  facingMode=facingMode==='environment'?'user':'environment';
  video.style.transform=facingMode==='user'?'scaleX(-1)':'scaleX(1)';
  if(running){cancelAnimationFrame(rafId); running=false; startCamera();}
});

navigator.mediaDevices.enumerateDevices().then(devices=>{
  if(devices.some(d=>d.kind==='videoinput'&&d.label)) startCamera();
});
</script>
</body>
</html>
