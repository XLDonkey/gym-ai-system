<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>XL Fitness — Live Skeleton</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100%;height:100%;
      background:#07090f;
      font-family:'SF Pro Display','Inter',system-ui,sans-serif;
      color:#fff;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    /* ── Top nav ── */
    #nav{
      position:fixed;top:0;left:0;right:0;height:48px;
      background:rgba(7,9,15,0.95);
      border-bottom:1px solid #141e2e;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;z-index:50;
    }
    .nav-logo{font-size:.75rem;font-weight:900;letter-spacing:4px;color:#00ff88;}
    .nav-right{display:flex;align-items:center;gap:12px;}
    #total-count{font-size:.65rem;color:#555;letter-spacing:1px;}
    #total-count b{color:#00ff88;}
    #settings-btn{
      background:transparent;border:1px solid #1a2030;border-radius:6px;
      color:#555;font-size:.85rem;padding:4px 10px;cursor:pointer;
    }

    /* ── Grid of Pi panels ── */
    #grid{
      position:fixed;top:48px;left:0;right:0;bottom:0;
      display:grid;
      gap:2px;
      background:#000;
      overflow:hidden;
    }

    /* Grid layouts by Pi count */
    #grid.pis-1{grid-template-columns:1fr;grid-template-rows:1fr;}
    #grid.pis-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
    #grid.pis-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
    #grid.pis-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
    #grid.pis-5,#grid.pis-6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;}

    /* On portrait mobile, stack vertically */
    @media (max-width:500px){
      #grid.pis-2{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
      #grid.pis-3,#grid.pis-4{grid-template-columns:1fr;grid-template-rows:repeat(4,1fr);}
    }

    /* ── Individual Pi panel ── */
    .pi-panel{
      position:relative;
      background:#0b0f18;
      overflow:hidden;
    }

    .pi-canvas{
      display:block;
      width:100%;height:100%;
    }

    /* Panel header overlay */
    .pi-header{
      position:absolute;top:0;left:0;right:0;
      padding:6px 10px;
      background:linear-gradient(to bottom,rgba(0,0,0,.8) 0%,transparent 100%);
      display:flex;align-items:center;justify-content:space-between;
      pointer-events:none;
    }
    .pi-name{font-size:.6rem;font-weight:700;letter-spacing:2px;color:#fff;text-transform:uppercase;}
    .pi-badges{display:flex;align-items:center;gap:6px;}
    .pi-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background .3s;}
    .pi-dot.live{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:glow 1.2s infinite alternate;}
    .pi-dot.warn{background:#f59e0b;}
    .pi-dot.err {background:#ef4444;}
    @keyframes glow{to{box-shadow:0 0 14px #00ff88;}}
    .pi-fps{font-size:.55rem;color:#333;letter-spacing:.5px;}
    .pi-hailo{font-size:.5rem;font-weight:700;letter-spacing:1px;color:#a78bfa;background:rgba(139,92,246,.15);padding:1px 5px;border-radius:3px;}

    /* Panel footer */
    .pi-footer{
      position:absolute;bottom:0;left:0;right:0;
      padding:4px 10px;
      background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);
      display:flex;align-items:center;justify-content:space-between;
      pointer-events:none;
    }
    .pi-people{font-size:.55rem;color:#555;}
    .pi-people b{color:#00ff88;}
    .pi-inf{font-size:.55rem;color:#333;}

    /* Disconnected overlay per panel */
    .pi-overlay{
      position:absolute;inset:0;
      background:rgba(7,9,15,.9);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;
      transition:opacity .3s;
    }
    .pi-overlay.hidden{opacity:0;pointer-events:none;}
    .pi-overlay-name{font-size:.65rem;font-weight:700;letter-spacing:2px;color:#fff;}
    .pi-overlay-msg{font-size:.6rem;color:#555;text-align:center;max-width:160px;line-height:1.6;}
    .pi-spinner{
      width:24px;height:24px;
      border:2px solid #1a2030;border-top-color:#00ff88;
      border-radius:50%;animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Settings panel ── */
    #settings-panel{
      position:fixed;top:56px;right:12px;
      background:#0b0f18;border:1px solid #1a2030;border-radius:12px;
      padding:16px;width:260px;z-index:60;
      display:none;max-height:80vh;overflow-y:auto;
    }
    #settings-panel.open{display:block;}
    .sp-title{font-size:.65rem;font-weight:700;letter-spacing:2px;color:#9ca3af;margin-bottom:12px;text-transform:uppercase;}
    .sp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .sp-label{font-size:.7rem;color:#9ca3af;}
    .sp-input{
      background:#141825;border:1px solid #2d3348;border-radius:6px;
      color:#fff;font-size:.7rem;padding:4px 8px;width:130px;text-align:right;
    }
    .sp-divider{height:1px;background:#1a2030;margin:12px 0;}
    .sp-pi-block{background:#0d1117;border:1px solid #1a2030;border-radius:8px;padding:10px;margin-bottom:8px;}
    .sp-pi-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
    .sp-pi-ip{flex:1;background:#141825;border:1px solid #2d3348;border-radius:5px;color:#fff;font-size:.68rem;padding:3px 7px;}
    .sp-pi-name{flex:1;background:#141825;border:1px solid #2d3348;border-radius:5px;color:#fff;font-size:.68rem;padding:3px 7px;}
    .sp-pi-del{background:transparent;border:1px solid #ef4444;border-radius:5px;color:#ef4444;font-size:.65rem;padding:3px 8px;cursor:pointer;}
    .sp-add-btn{width:100%;padding:7px;background:transparent;border:1px dashed #2d3348;border-radius:7px;color:#555;font-size:.7rem;cursor:pointer;margin-bottom:8px;}
    .sp-add-btn:hover{border-color:#00ff88;color:#00ff88;}
    .sp-apply{width:100%;padding:9px;background:#00ff88;border:none;border-radius:8px;color:#000;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:1px;}
  </style>
</head>
<body>

<!-- Top nav -->
<div id="nav">
  <div class="nav-logo">XL FITNESS</div>
  <div class="nav-right">
    <div id="total-count"><b id="tc">0</b> people detected</div>
    <button id="settings-btn" onclick="toggleSettings()">⚙ Pis</button>
  </div>
</div>

<!-- Grid of Pi panels (populated by JS) -->
<div id="grid" class="pis-1"></div>

<!-- Settings panel -->
<div id="settings-panel">
  <div class="sp-title">Pi Connections</div>
  <div id="pi-list"></div>
  <button class="sp-add-btn" onclick="addPiRow()">+ Add Pi</button>
  <div class="sp-divider"></div>
  <div class="sp-row">
    <span class="sp-label">Bone width</span>
    <input class="sp-input" id="bone-w" type="number" value="3" min="1" max="12"/>
  </div>
  <div class="sp-row">
    <span class="sp-label">Joint size</span>
    <input class="sp-input" id="joint-r" type="number" value="6" min="2" max="20"/>
  </div>
  <div class="sp-row">
    <span class="sp-label">Show bbox</span>
    <input id="show-bbox" type="checkbox"/>
  </div>
  <div class="sp-divider"></div>
  <button class="sp-apply" onclick="applySettings()">Apply & Reconnect</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG — stored in localStorage
// ═══════════════════════════════════════════════════════════════════════════
const DEFAULT_PIS = [
  { ip: "192.168.1.40", port: 8765, name: "Pi 1" },
];

function loadConfig() {
  try {
    const saved = localStorage.getItem('xl_pis');
    return saved ? JSON.parse(saved) : DEFAULT_PIS;
  } catch { return DEFAULT_PIS; }
}

function saveConfig(pis) {
  localStorage.setItem('xl_pis', JSON.stringify(pis));
}

let PIS      = loadConfig();
let BONE_W   = parseInt(localStorage.getItem('xl_bone_w') || '3');
let JOINT_R  = parseInt(localStorage.getItem('xl_joint_r') || '6');
let SHOW_BBOX = localStorage.getItem('xl_bbox') === 'true';

// ═══════════════════════════════════════════════════════════════════════════
// STATE — one entry per Pi
// ═══════════════════════════════════════════════════════════════════════════
const piState = {};   // keyed by pi index

// ═══════════════════════════════════════════════════════════════════════════
// GRID SETUP
// ═══════════════════════════════════════════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = `pis-${Math.min(PIS.length, 6)}`;

  PIS.forEach((pi, idx) => {
    const panel = document.createElement('div');
    panel.className = 'pi-panel';
    panel.id = `panel-${idx}`;
    panel.innerHTML = `
      <canvas class="pi-canvas" id="cvs-${idx}"></canvas>
      <div class="pi-header">
        <div class="pi-name" id="name-${idx}">${pi.name || 'Pi ' + (idx+1)}</div>
        <div class="pi-badges">
          <div class="pi-fps" id="fps-${idx}">— fps</div>
          <div class="pi-dot" id="dot-${idx}"></div>
        </div>
      </div>
      <div class="pi-footer">
        <div class="pi-people">People: <b id="ppl-${idx}">0</b></div>
        <div class="pi-inf" id="inf-${idx}">—ms</div>
      </div>
      <div class="pi-overlay" id="ov-${idx}">
        <div class="pi-overlay-name">${pi.name || 'Pi ' + (idx+1)}</div>
        <div class="pi-spinner" id="sp-${idx}"></div>
        <div class="pi-overlay-msg" id="ovm-${idx}">Connecting to<br/>${pi.ip}:${pi.port || 8765}</div>
      </div>
    `;
    grid.appendChild(panel);

    // Size canvas to panel
    piState[idx] = {
      ws: null, lastData: null, connected: false,
      retryTimer: null, skel: null,
      fps: 0, fpsCounter: 0, fpsTimer: Date.now(),
    };
  });

  // Resize all canvases
  resizeAll();
}

function resizeAll() {
  PIS.forEach((_, idx) => {
    const panel = document.getElementById(`panel-${idx}`);
    const cvs   = document.getElementById(`cvs-${idx}`);
    if (!panel || !cvs) return;
    const dpr = devicePixelRatio || 1;
    cvs.width  = panel.offsetWidth  * dpr;
    cvs.height = panel.offsetHeight * dpr;
    cvs.style.width  = panel.offsetWidth  + 'px';
    cvs.style.height = panel.offsetHeight + 'px';
  });
}

window.addEventListener('resize', () => { resizeAll(); });
window.addEventListener('orientationchange', () => setTimeout(resizeAll, 300));

// ═══════════════════════════════════════════════════════════════════════════
// WEBSOCKET — one per Pi
// ═══════════════════════════════════════════════════════════════════════════
function connectPi(idx) {
  const pi  = PIS[idx];
  const st  = piState[idx];
  const dot = document.getElementById(`dot-${idx}`);
  const ovm = document.getElementById(`ovm-${idx}`);
  const sp  = document.getElementById(`sp-${idx}`);

  if (!pi || !st) return;

  clearTimeout(st.retryTimer);
  if (st.ws) { st.ws.onclose = null; st.ws.close(); st.ws = null; }

  const url = `ws://${pi.ip}:${pi.port || 8765}`;
  ovm.textContent = `Connecting to\n${url}`;
  if (sp) sp.style.display = 'block';
  dot.className = 'pi-dot warn';

  const ws = new WebSocket(url);
  st.ws = ws;

  ws.onopen = () => {
    st.connected = true;
    dot.className = 'pi-dot live';
    document.getElementById(`ov-${idx}`).classList.add('hidden');
    console.log(`[Pi${idx}] Connected: ${url}`);
  };

  ws.onmessage = (evt) => {
    try {
      const data = JSON.parse(evt.data);
      if (data.type === 'hello') {
        document.getElementById(`name-${idx}`).textContent =
          data.name || PIS[idx].name || `Pi ${idx+1}`;
        // Show Hailo badge if applicable
        if (data.hailo) {
          const badges = document.querySelector(`#panel-${idx} .pi-badges`);
          if (badges && !badges.querySelector('.pi-hailo')) {
            const tag = document.createElement('div');
            tag.className = 'pi-hailo';
            tag.textContent = 'HAILO';
            badges.insertBefore(tag, badges.firstChild);
          }
        }
        return;
      }
      st.lastData = data;
      // Cache skeleton pairs (same for all frames)
      if (data.sk) st.skel = data.sk;
      // FPS counter
      st.fpsCounter++;
    } catch(e) {}
  };

  ws.onerror = () => {
    dot.className = 'pi-dot err';
  };

  ws.onclose = () => {
    st.connected = false;
    dot.className = 'pi-dot err';
    const ov = document.getElementById(`ov-${idx}`);
    ov.classList.remove('hidden');
    if (sp) sp.style.display = 'none';
    ovm.textContent = `Reconnecting in 5s…\n${url}`;
    st.retryTimer = setTimeout(() => connectPi(idx), 5000);
  };
}

function connectAll() {
  PIS.forEach((_, idx) => connectPi(idx));
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER LOOP — one rAF loop for all panels
// ═══════════════════════════════════════════════════════════════════════════
const PERSON_COLOURS = ['#00ff88','#00aaff','#ff6600','#ff00aa','#ffff00','#aa00ff'];

function renderAll() {
  requestAnimationFrame(renderAll);

  let totalPeople = 0;
  const now = Date.now();

  PIS.forEach((_, idx) => {
    const st  = piState[idx];
    const cvs = document.getElementById(`cvs-${idx}`);
    if (!cvs) return;

    const ctx = cvs.getContext('2d');
    const W   = cvs.width  / (devicePixelRatio || 1);
    const H   = cvs.height / (devicePixelRatio || 1);
    const dpr = devicePixelRatio || 1;

    // Scale ctx for retina
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Clear
    ctx.fillStyle = '#0b0f18';
    ctx.fillRect(0, 0, W, H);

    // FPS update
    if (now - st.fpsTimer >= 1000) {
      st.fps = st.fpsCounter / ((now - st.fpsTimer) / 1000);
      st.fpsCounter = 0;
      st.fpsTimer = now;
      document.getElementById(`fps-${idx}`).textContent =
        st.fps.toFixed(1) + ' fps';
    }

    const data = st.lastData;
    if (!data) return;

    const people = data.p || [];
    const skel   = st.skel || data.sk || [];

    totalPeople += people.length;
    document.getElementById(`ppl-${idx}`).textContent = people.length;
    document.getElementById(`inf-${idx}`).textContent =
      (data.ims || 0).toFixed(0) + 'ms';

    // Draw each person
    for (const person of people) {
      const colour = person.colour || PERSON_COLOURS[person.id % PERSON_COLOURS.length];
      const kps    = person.kps;
      if (!kps || kps.length === 0) continue;

      // Normalised → canvas pixels
      const px = (kp) => ({ x: kp[0]*W, y: kp[1]*H, c: kp[2] });

      // Bounding box
      if (SHOW_BBOX && person.bbox) {
        const b = person.bbox;
        ctx.strokeStyle = colour + '33';
        ctx.lineWidth = 1;
        ctx.setLineDash([3,3]);
        ctx.strokeRect(b[0]*W, b[1]*H, (b[2]-b[0])*W, (b[3]-b[1])*H);
        ctx.setLineDash([]);
      }

      // Bones
      ctx.lineWidth = BONE_W;
      ctx.lineCap = 'round';
      for (const [a, b] of skel) {
        if (a >= kps.length || b >= kps.length) continue;
        const pa = px(kps[a]), pb = px(kps[b]);
        if (pa.c < 0.2 || pb.c < 0.2) continue;
        const alpha = Math.min(1, (pa.c + pb.c) * 0.75);
        ctx.strokeStyle = colour + Math.round(alpha*255).toString(16).padStart(2,'0');
        ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
      }

      // Joints
      for (let i = 0; i < kps.length; i++) {
        const p = px(kps[i]);
        if (p.c < 0.2) continue;
        const r = JOINT_R * (0.6 + p.c * 0.7);

        // Glow
        ctx.beginPath(); ctx.arc(p.x,p.y,r+3,0,Math.PI*2);
        ctx.fillStyle = colour+'22'; ctx.fill();

        // Dot
        ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
        ctx.fillStyle = colour; ctx.fill();

        // Centre
        ctx.beginPath(); ctx.arc(p.x,p.y,r*0.3,0,Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fill();
      }

      // Person label above nose (kp 0)
      if (kps[0] && kps[0][2] > 0.25) {
        const nose = px(kps[0]);
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = colour;
        ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
        ctx.fillText('P'+(person.id+1), nose.x, nose.y - 16);
        ctx.shadowBlur = 0; ctx.textAlign = 'left';
      }
    }

    // Empty state
    if (people.length === 0 && st.connected) {
      ctx.fillStyle = '#1a2030';
      ctx.font = '11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('No people detected', W/2, H/2);
      ctx.textAlign = 'left';
    }
  });

  document.getElementById('tc').textContent = totalPeople;
}

// ═══════════════════════════════════════════════════════════════════════════
// SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════════════════
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderSettingsForm();
}

function renderSettingsForm() {
  const list = document.getElementById('pi-list');
  list.innerHTML = '';
  PIS.forEach((pi, idx) => {
    const block = document.createElement('div');
    block.className = 'sp-pi-block';
    block.innerHTML = `
      <div class="sp-pi-row">
        <input class="sp-pi-name" id="sn-${idx}" placeholder="Name" value="${pi.name || ''}"/>
        <button class="sp-pi-del" onclick="removePi(${idx})">✕</button>
      </div>
      <div class="sp-pi-row">
        <input class="sp-pi-ip" id="si-${idx}" placeholder="IP e.g. 192.168.1.40" value="${pi.ip || ''}"/>
        <input class="sp-pi-ip" id="sp-${idx}" placeholder="Port" value="${pi.port || 8765}" style="width:60px;"/>
      </div>
    `;
    list.appendChild(block);
  });

  document.getElementById('bone-w').value  = BONE_W;
  document.getElementById('joint-r').value = JOINT_R;
  document.getElementById('show-bbox').checked = SHOW_BBOX;
}

function addPiRow() {
  PIS.push({ ip: '192.168.1.4' + (PIS.length + 1), port: 8765, name: 'Pi ' + (PIS.length + 1) });
  renderSettingsForm();
}

function removePi(idx) {
  PIS.splice(idx, 1);
  renderSettingsForm();
}

function applySettings() {
  // Read Pi list
  const newPis = [];
  PIS.forEach((_, idx) => {
    const ip   = document.getElementById(`si-${idx}`)?.value.trim();
    const port = parseInt(document.getElementById(`sp-${idx}`)?.value) || 8765;
    const name = document.getElementById(`sn-${idx}`)?.value.trim() || `Pi ${idx+1}`;
    if (ip) newPis.push({ ip, port, name });
  });
  PIS = newPis;
  saveConfig(PIS);

  BONE_W   = parseInt(document.getElementById('bone-w').value)  || 3;
  JOINT_R  = parseInt(document.getElementById('joint-r').value) || 6;
  SHOW_BBOX = document.getElementById('show-bbox').checked;
  localStorage.setItem('xl_bone_w', BONE_W);
  localStorage.setItem('xl_joint_r', JOINT_R);
  localStorage.setItem('xl_bbox', SHOW_BBOX);

  document.getElementById('settings-panel').classList.remove('open');

  // Rebuild everything
  buildGrid();
  connectAll();
}

// Dismiss settings on outside tap
document.addEventListener('click', (e) => {
  const panel = document.getElementById('settings-panel');
  const btn   = document.getElementById('settings-btn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
buildGrid();
connectAll();
renderAll();
</script>
</body>
</html>
